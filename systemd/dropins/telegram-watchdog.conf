# telegram-watchdog.conf: shared systemd watchdog drop-in for the Telegram
# bridges (scripts/telegram_bridge.py).
#
# Applies to:
#   skchat-telegram-opus.service
#   skchat-telegram-lumina.service
#   skchat-telegram@.service (and any enabled instance, e.g. skchat-telegram@opus)
#
# NOT installed live by this change. To adopt on a host, copy this file into
# each unit's drop-in directory (creating it if needed), then daemon-reload
# and restart that one unit, e.g.:
#   mkdir -p ~/.config/systemd/user/skchat-telegram-opus.service.d
#   cp systemd/dropins/telegram-watchdog.conf \
#      ~/.config/systemd/user/skchat-telegram-opus.service.d/
#   systemctl --user daemon-reload
#   systemctl --user restart skchat-telegram-opus.service
# Same for skchat-telegram-lumina.service.d/. The live cutover is the
# controller's job, with rollback readiness: reverting is deleting this file
# from the unit's .d directory, daemon-reload, restart.
#
# Correctness requirement: the bridge must call sd_notify("READY=1") once it
# is actually ready to poll (scripts/bridge_watchdog.py:sd_notify, wired in
# scripts/telegram_bridge.py:main). Type=notify makes systemd wait for that
# handshake before considering the unit started; a bridge that never sends it
# (bad NOTIFY_SOCKET plumbing, or an exception before the sd_notify call)
# will time out at TimeoutStartSec (systemd default 90s) and be treated as a
# failed start, taking the bot down instead of hardening it. Verify the
# READY=1 handshake on a real Type=notify unit before relying on this in
# production, e.g. `systemd-analyze verify` plus a real restart + journal
# check for "Started" (not "Failed").
#
# WatchdogSec=90: if the bridge stops sending WATCHDOG=1 (every successful
# poll cycle, ~10-20s under normal conditions -- see POLL_TIMEOUT in
# scripts/telegram_bridge.py) for 90s straight, systemd kills and restarts
# it. This is the hard backstop for the exact wedge incident (a poll that
# hangs forever below asyncio.wait_for's own timeout): the bridge's own
# 3-consecutive-failure sk-alert path is tuned to fire first in the common
# case, but a genuine indefinite hang trips this watchdog regardless.
#
# Restart=on-failure (not "always"): restarts on any non-zero exit or signal
# kill (including the WatchdogSec-triggered SIGABRT and the bridge's own
# sys.exit(1) wedge path), but NOT on a clean `systemctl stop` -- avoids a
# restart loop fighting an intentional stop.

[Unit]
StartLimitIntervalSec=300
StartLimitBurst=5

[Service]
Type=notify
NotifyAccess=main
WatchdogSec=90
Restart=on-failure
RestartSec=5
