# skchat v2 Docker Swarm stack — Tailscale-native
#
# Deploy:
#   set -a && source /var/data/deploy_skchat/skchat.env && set +a
#   docker stack deploy \
#     --env-file /var/data/deploy_skchat/skchat.env \
#     -c deploy/v2/skchat-stack.yml \
#     skchat
#
# Full setup guide: deploy/v2/README.md
#
# Reachability model (tailnet-first):
#   • Default: all three services are reachable inside the tailnet via the
#     node's Tailscale hostname (e.g. noroc2027.tail204f0c.ts.net) using
#     `tailscale serve` to proxy each service port:
#
#       tailscale serve --bg https+insecure://localhost:8765   # webui
#       tailscale serve --bg https+insecure://localhost:9385   # daemon health
#       tailscale serve --bg https+insecure://localhost:18800  # voice (internal)
#
#     voice and daemon are internal-only and normally NOT served via Tailscale;
#     the serve rule above is only needed if a peer agent needs to reach the
#     daemon health endpoint directly over the tailnet.  webui is the normal
#     entry point for all external access.
#
#   • Opt-in public: the webui router gets a Traefik label set so that
#     the Traefik edge (cloud-public-prod overlay) can expose
#     skchat.skstack01.douno.it — gated by the existing pairing-gate + TLS.
#     Disable by removing or setting traefik.enable=false on the webui service.
#   • voice and daemon services are NOT exposed via Traefik; they are
#     internal to the skchat-internal overlay and must be reached through
#     webui or directly on the tailnet by trusted peer services.
#
# Networks:
#   cloud-public-prod — external Traefik overlay (opt-in public routes only)
#   skchat-internal   — internal overlay; all three services; no public routing
#
# Secrets: ALL sensitive values come from /var/data/deploy_skchat/skchat.env
#          (or OpenBao — see deploy/SECRETS.md).  Nothing is hardcoded here.

version: "3.8"

services:

  # ── webui ────────────────────────────────────────────────────────────────────
  # FastAPI web UI, LiveKit token mint, /call/* ring/answer, /pair gate.
  webui:
    image: ${SKCHAT_IMAGE_REGISTRY:-skchat-webui}:${SKCHAT_VERSION:-latest}
    env_file: []          # loaded by `docker stack deploy --env-file`
    environment:
      SKCHAT_HOST: "0.0.0.0"
      SKCHAT_PORT: "8765"
      SKCHAT_NO_BROWSER: "true"
      SKAGENT: "${SKAGENT:-lumina}"
      # LLM / voice
      SKCHAT_LLM_URL: "${SKCHAT_LLM_URL}"
      SKCHAT_LLM_MODEL: "${SKCHAT_LLM_MODEL}"
      SKCHAT_STT_URL: "${SKCHAT_STT_URL}"
      SKCHAT_TTS_URL: "${SKCHAT_TTS_URL}"
      # LiveKit (API key + secret come from skchat.env — not echoed here)
      SKCHAT_LIVEKIT_URL: "${SKCHAT_LIVEKIT_URL}"
      SKCHAT_LIVEKIT_API_KEY: "${SKCHAT_LIVEKIT_API_KEY}"
      SKCHAT_LIVEKIT_API_SECRET: "${SKCHAT_LIVEKIT_API_SECRET}"
      SKCHAT_LIVEKIT_DEFAULT_ROOM: "${SKCHAT_LIVEKIT_DEFAULT_ROOM:-lumina-and-chef}"
      # TURN (secret never logged; only short-lived derived creds leave the app)
      SKCHAT_TURN_SECRET: "${SKCHAT_TURN_SECRET}"
      SKCHAT_TURN_URLS: "${SKCHAT_TURN_URLS}"
      SKCHAT_STUN_URLS: "${SKCHAT_STUN_URLS}"
      SKCHAT_TURN_TTL: "${SKCHAT_TURN_TTL:-300}"
      # skvoice / voice_engine WS (internal overlay hostname)
      SKCHAT_SKVOICE_URL: "ws://voice:18800/ws/voice"
      # CapAuth / identity
      SKCHAT_IDENTITY: "${SKCHAT_IDENTITY}"
      SKCAPSTONE_HOME: "${SKCAPSTONE_HOME:-/data/skcapstone}"
    networks:
      - cloud-public-prod
      - skchat-internal
    volumes:
      # capauth keys and pairing state — must persist across redeploys
      - skchat-identity:/data/capauth
      - skchat-data:/data/skchat
    healthcheck:
      test: ["CMD", "curl", "-fs", "http://localhost:8765/health"]
      interval: 30s
      timeout: 10s
      start_period: 20s
      retries: 3
    deploy:
      mode: replicated
      replicas: 1
      placement:
        constraints:
          - node.role == worker
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 5
        window: 120s
      update_config:
        parallelism: 1
        delay: 10s
        failure_action: rollback
        monitor: 30s
        max_failure_ratio: 0
        order: start-first
      rollback_config:
        parallelism: 1
        delay: 0s
        failure_action: pause
        monitor: 30s
        max_failure_ratio: 0
        order: stop-first
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 128M
      labels:
        # ── Traefik (opt-in public) ──────────────────────────────────────────
        # Remove traefik.enable to keep this tailnet-only.
        traefik.enable: "true"
        traefik.swarm.network: "cloud-public-prod"
        # HTTPS public hostname (Cloudflare → Traefik → pairing gate)
        traefik.http.routers.skchat-webui.rule: "Host(`skchat.skstack01.douno.it`)"
        traefik.http.routers.skchat-webui.entrypoints: "websecure"
        traefik.http.routers.skchat-webui.tls: "true"
        traefik.http.routers.skchat-webui.tls.certresolver: "main"
        traefik.http.routers.skchat-webui.service: "skchat-webui"
        traefik.http.services.skchat-webui.loadbalancer.server.port: "8765"
        traefik.http.services.skchat-webui.loadbalancer.server.scheme: "http"
        # WebSocket upgrade passthrough (needed for /ws/voice and LiveKit WS)
        traefik.http.middlewares.skchat-ws.headers.customrequestheaders.Connection: "upgrade"
        traefik.http.middlewares.skchat-ws.headers.customrequestheaders.Upgrade: "websocket"
        traefik.http.routers.skchat-webui.middlewares: "skchat-ws"

  # ── voice engine ─────────────────────────────────────────────────────────────
  # WebSocket voice service (ex-skvoice): STT → LLM → TTS pipeline.
  # Internal only — reached by webui at ws://voice:18800/ws/voice.
  # NOT exposed via Traefik.
  #
  # Entrypoint: `skchat-voice` (Phase-2 console script → skchat.transports.serve_ws:main)
  # Env vars: SKCHAT_VOICE_HOST / SKCHAT_VOICE_PORT control the bind address;
  #           SKVOICE_* vars are read by VoiceConfig.from_env() for LLM/STT/TTS.
  voice:
    image: ${SKCHAT_IMAGE_REGISTRY:-skchat-voice}:${SKCHAT_VERSION:-latest}
    # Override the Dockerfile's legacy python -m stub; use the Phase-2 console script.
    command: ["skchat-voice"]
    environment:
      # Bind address for the WebSocket server (skchat.transports.serve_ws)
      SKCHAT_VOICE_HOST: "0.0.0.0"
      SKCHAT_VOICE_PORT: "18800"
      # VoiceConfig.from_env() reads SKVOICE_* keys
      SKVOICE_AGENT: "${SKAGENT:-lumina}"
      SKVOICE_LLM_URL: "${SKCHAT_LLM_URL}"
      SKVOICE_MODEL: "${SKCHAT_LLM_MODEL}"
      SKVOICE_FALLBACK_URL: "${SKVOICE_FALLBACK_URL}"
      SKVOICE_FALLBACK_MODEL: "${SKVOICE_FALLBACK_MODEL}"
      SKVOICE_STT_URL: "${SKCHAT_STT_URL}"
      SKVOICE_TTS_URL: "${SKCHAT_TTS_URL}"
      SKVOICE_TTS_VOICE: "${SKVOICE_TTS_VOICE:-lumina}"
      SKVOICE_MAX_TOKENS: "${SKVOICE_MAX_TOKENS:-200}"
      SKVOICE_STT_MIN_RMS: "${SKVOICE_STT_MIN_RMS:-800}"
    networks:
      - skchat-internal
    volumes:
      # Recordings directory — voice sessions may write audio blobs here.
      - skchat-recordings:/data/recordings
    healthcheck:
      test: ["CMD", "curl", "-fs", "http://localhost:18800/health"]
      interval: 30s
      timeout: 10s
      start_period: 30s
      retries: 3
    deploy:
      mode: replicated
      replicas: 1
      placement:
        constraints:
          - node.role == worker
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 5
        window: 120s
      update_config:
        parallelism: 1
        delay: 10s
        failure_action: rollback
        monitor: 30s
        max_failure_ratio: 0
        order: start-first
      rollback_config:
        parallelism: 1
        delay: 0s
        failure_action: pause
        monitor: 30s
        max_failure_ratio: 0
        order: stop-first
      resources:
        limits:
          memory: 1G
        reservations:
          memory: 256M
      labels:
        traefik.enable: "false"

  # ── daemon ───────────────────────────────────────────────────────────────────
  # SKComm receive loop, history (SQLite), advocacy engine, outbox retry.
  # Internal only — health reachable on the tailnet at :9385.
  # NOT exposed via Traefik.
  #
  # Entrypoint: `skchat daemon start --foreground --interval N`
  #   ("daemon run" does not exist; "daemon start" with --foreground keeps the
  #    process in the foreground so Docker Swarm can supervise it directly.
  #    The internal singleton lock in run_daemon() prevents double-polling if
  #    Swarm ever starts a second task before the first fully exits.)
  #
  # IMPORTANT: replicas MUST stay at 1.  Two daemon instances would both poll
  # the same SKComm inbox and create duplicate deliveries / split outbox state.
  # The mode: global-job alternative is not used here because we need the
  # restart_policy; instead the singleton is enforced via the lock in daemon.py
  # AND the Swarm placement constraint below.
  daemon:
    image: ${SKCHAT_IMAGE_REGISTRY:-skchat-daemon}:${SKCHAT_VERSION:-latest}
    # Override Dockerfile.daemon's default `skchat daemon run` (which doesn't exist).
    # --foreground keeps the process attached so Swarm can detect exit + restart.
    # The interval is read from SKCHAT_DAEMON_INTERVAL env var AND passed as a flag;
    # the static "5" default here is overridden if the env var is set at deploy time.
    # Note: Docker Swarm expands ${VAR} in the command array from --env-file, so
    # passing the env var through is correct; the literal "5" is a fallback for the
    # flag itself (the env var on the container is the primary control knob).
    command:
      - "skchat"
      - "daemon"
      - "start"
      - "--foreground"
      - "--interval"
      - "5"
    environment:
      SKAGENT: "${SKAGENT:-lumina}"
      SKCHAT_DAEMON_INTERVAL: "${SKCHAT_DAEMON_INTERVAL:-5}"
      SKCHAT_DAEMON_QUIET: "${SKCHAT_DAEMON_QUIET:-false}"
      SKCHAT_HOME: "/data/skchat"
      SKCOMM_HOME: "/data/skcomm"
      # Identity (optional override — resolved from SKAGENT if blank)
      SKCHAT_IDENTITY: "${SKCHAT_IDENTITY:-}"
      SKCAPSTONE_HOME: "${SKCAPSTONE_HOME:-/data/skcapstone}"
      # skmem-pg (memory backend)
      SKMEMORY_PG_HOST: "${SKMEMORY_PG_HOST}"
      SKMEMORY_PG_PORT: "${SKMEMORY_PG_PORT:-5432}"
      SKMEMORY_PG_DB: "${SKMEMORY_PG_DB:-skmemory}"
      SKMEMORY_PG_USER: "${SKMEMORY_PG_USER}"
      SKMEMORY_PG_PASSWORD: "${SKMEMORY_PG_PASSWORD}"
    networks:
      - skchat-internal
    volumes:
      # All state that must survive redeploys
      - skchat-data:/data/skchat
      - skchat-skcomm:/data/skcomm
      - skchat-identity:/data/capauth
    healthcheck:
      test: ["CMD", "curl", "-fs", "http://localhost:9385/health"]
      interval: 30s
      timeout: 10s
      start_period: 20s
      retries: 3
    deploy:
      mode: replicated
      replicas: 1             # MUST stay 1 — see singleton note above
      placement:
        constraints:
          - node.role == worker
          # Pin daemon to one specific node to guarantee the singleton.
          # Label the target node:
          #   docker node update --label-add skchat.daemon=true <node-id>
          # then uncomment:
          # - node.labels.skchat.daemon == true
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 5
        window: 120s
      update_config:
        parallelism: 1
        delay: 10s
        failure_action: rollback
        monitor: 30s
        max_failure_ratio: 0
        order: stop-first          # stop old first — only one daemon polls the inbox
      rollback_config:
        parallelism: 1
        delay: 0s
        failure_action: pause
        monitor: 30s
        max_failure_ratio: 0
        order: stop-first
      resources:
        limits:
          memory: 256M
        reservations:
          memory: 64M
      labels:
        traefik.enable: "false"

# ── networks ──────────────────────────────────────────────────────────────────
networks:
  cloud-public-prod:
    external: true          # shared Traefik overlay — must exist before deploy
  skchat-internal:
    driver: overlay
    internal: true          # no external routing; tailnet is the only ingress path
    attachable: false

# ── volumes ───────────────────────────────────────────────────────────────────
# Named volumes persist on the placement node.
# Backup target: Garage (see deploy/SECRETS.md — Batch B5).
volumes:
  skchat-data:              # history.db, outbox.db — daemon + webui shared state
    driver: local
  skchat-skcomm:            # skcomm transport state, pending outbox
    driver: local
  skchat-identity:          # capauth keys, pairing state — shared webui+daemon
    driver: local
  skchat-recordings:        # voice engine audio recordings (voice service only)
    driver: local
