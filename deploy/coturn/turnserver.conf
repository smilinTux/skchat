# turnserver.conf: sovereign skchat coturn TURN relay (TEMPLATE)
#
# Config-file form of the sovereign coturn. Serves plain TURN/STUN on 3478
# (udp+tcp) AND TURN over TLS on 443/tcp so off-tailnet (cellular) joiners whose
# networks block UDP / high ports can still reach the relay on the one port that
# is almost never filtered.
#
# This is a REPO TEMPLATE. Copy it to the host, fill the cert paths, and mount
# it into the container (see deploy/coturn/start-coturn.sh). Never commit a copy
# that contains the static-auth-secret: the shared secret is supplied out of band
# (start-coturn.sh reads coturn.secret and passes --static-auth-secret), NOT here.
#
# Cert issuance + rotation: see deploy/coturn/README.md
#   tailscale cert noroc2027.tail204f0c.ts.net

# ---- listeners --------------------------------------------------------------
# Plain TURN/STUN (matches the live relay).
listening-port=3478
# TURN over TLS. 443/tcp is the escape hatch for restrictive networks.
tls-listening-port=443

# Relay media port range (keep in sync with start-coturn.sh + firewall).
min-port=49152
max-port=65535

# ---- auth (ephemeral REST credentials) --------------------------------------
# coturn time-limited credentials. The shared secret is NOT written here; it is
# passed at launch via --static-auth-secret from coturn.secret (0600, never
# committed). connectivity.py derives per-call HMAC creds against the same secret.
use-auth-secret
realm=noroc2027.tail204f0c.ts.net

# ---- TLS cert (tailscale-issued for the MagicDNS name) ----------------------
# `tailscale cert noroc2027.tail204f0c.ts.net` writes:
#   noroc2027.tail204f0c.ts.net.crt   (fullchain PEM)
#   noroc2027.tail204f0c.ts.net.key   (private key PEM)
# Mount that directory read-only into the container at /etc/coturn/certs.
# coturn directives: `cert` = certificate file, `pkey` = private key file.
cert=/etc/coturn/certs/noroc2027.tail204f0c.ts.net.crt
pkey=/etc/coturn/certs/noroc2027.tail204f0c.ts.net.key
cipher-list=HIGH
no-tlsv1
no-tlsv1_1

# ---- hardening (mirrors start-coturn.sh) ------------------------------------
no-multicast-peers
fingerprint
stale-nonce=0
# Block relaying to private / loopback / tailnet ranges (no SSRF pivot).
denied-peer-ip=0.0.0.0-0.255.255.255
denied-peer-ip=10.0.0.0-10.255.255.255
denied-peer-ip=100.64.0.0-100.127.255.255
denied-peer-ip=127.0.0.0-127.255.255.255
denied-peer-ip=169.254.0.0-169.254.255.255
denied-peer-ip=172.16.0.0-172.31.255.255
denied-peer-ip=192.168.0.0-192.168.255.255
denied-peer-ip=::1
denied-peer-ip=fd00::
