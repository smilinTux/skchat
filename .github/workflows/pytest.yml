name: Tests

# Dedicated pytest workflow for the skchat-sovereign package.
#
# Runs the headless-safe unit/integration suite on a py3.11 / py3.12 matrix.
# This mirrors the repo's known-passing local command, with one correctness
# fix over a naive copy of pyproject's addopts:
#
#   pyproject.toml sets `addopts = "... -m 'not live'"`. pytest's `-m` is a
#   SINGLE option, so passing another `-m` on the command line REPLACES that
#   default rather than ANDing with it. To keep `live` excluded *and* add the
#   stack-requiring markers, we pass ONE combined marker expression below.
#
# Markers deselected (defined in [tool.pytest.ini_options] of pyproject.toml,
# applied via @pytest.mark / pytestmark in the test files — verified, not faked):
#   - live        : hits live model endpoints (.100/localhost) — no model in CI
#   - integration : requires live external services
#   - e2e_live    : end-to-end file-transport flows (need a running daemon)
#   - e2e_3way    : 3-way group chat E2E (need multiple live agents)
#
# Everything else (the bulk of the suite) runs fully headless on GitHub runners.
# The sibling sk* deps pulled in by the `dev` extra (skcomms, skmemory) are
# published on PyPI, so `pip install -e ".[dev]"` resolves on a clean runner.

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

permissions:
  contents: read

concurrency:
  group: tests-${{ github.ref }}
  cancel-in-progress: true

jobs:
  pytest:
    name: pytest (py${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install package + dev deps
        # The dev extra pulls the sibling sk* packages (skcomms, skmemory) from
        # PyPI. If that resolution ever breaks, fall back to a base editable
        # install plus the minimal test runner so the suite still executes
        # honestly rather than erroring out at install time.
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]" || { pip install -e . && pip install pytest pytest-asyncio; }

      - name: Run pytest (headless-safe markers only)
        # ONE combined marker expression — see header note on the -m override.
        run: |
          python -m pytest tests/ -q \
            -m "not live and not integration and not e2e_live and not e2e_3way"
