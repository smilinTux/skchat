name: Publish to PyPI

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read

jobs:
  # Release gate: red tests MUST block the PyPI/npm publish jobs below
  # (coord 56018251). No `|| true`, no continue-on-error. The marker
  # exclusions match ci.yml/pytest.yml so live-stack legs (live model
  # endpoints, running daemons, multi-agent E2E) do not block a release
  # from a headless GitHub runner. Note pytest's `-m` is a single option:
  # one combined expression, or the pyproject `-m "not live"` default is
  # replaced instead of ANDed.
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
      - name: Install package + dev deps
        # The dev extra pulls the sibling sk* packages (skcomms, skmemory)
        # from PyPI. If that resolution ever breaks, fall back to a base
        # editable install plus the minimal test runner so the suite still
        # executes honestly rather than erroring out at install time.
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]" || { pip install -e . && pip install pytest pytest-asyncio; }
      - name: Run pytest (headless-safe markers only, gates publish)
        run: |
          python -m pytest tests/ -v --tb=short \
            -m "not live and not integration and not e2e_live and not e2e_3way"

  publish-pypi:
    needs: test
    if: success()
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install build twine
      - run: python -m build
      - run: twine upload dist/*
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.PYPI_API_TOKEN }}

  publish-npm:
    needs: test
    if: success()
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          registry-url: "https://registry.npmjs.org"
      - name: Publish to npm
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
