name: QA

# Runs the CI-able QA unit/integration pytest suites on every push to main,
# every PR, and every version tag. The LIVE legs of the QA suite (lane/spaces
# harness on :8765, two-party, two-browser — see scripts/qa_suite.sh) require a
# running stack and CANNOT run in GitHub CI; they stay local. See
# docs/qa/QA_TEST_PLAN.md "## CI".

on:
  push:
    branches: ["main"]
    tags: ["v*"]
  pull_request:

permissions:
  contents: read

jobs:
  qa:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install package + dev deps
        run: |
          pip install -e ".[dev]" || { pip install -e . && pip install pytest pytest-asyncio; }
      # Run the bulk of the suite. The default pyproject addopts already excludes
      # the `live` marker (hits live model endpoints). We additionally deselect
      # the markers that need a running stack / network / daemon and so cannot
      # run headless in GitHub CI:
      #   - integration : requires live external services
      #   - e2e_live    : end-to-end file-transport flows (need running daemon)
      #   - e2e_3way    : 3-way group chat E2E (need multiple live agents)
      - name: Run QA pytest suite
        run: python -m pytest tests/ -q -m "not integration and not e2e_live and not e2e_3way"
