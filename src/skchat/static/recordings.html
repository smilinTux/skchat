<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>Lumina Recordings</title>
<meta name="viewport" content="width=device-width,initial-scale=1" />
<!-- 2027 design system: Inter + JetBrains Mono -->
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
<style>
  /* ── 2027 Design System tokens ──────────────────────────────────────────────
     Flat-with-depth (NEVER glass/blur). One teal accent.
     ──────────────────────────────────────────────────────────────────────── */
  :root {
    color-scheme: dark;
    --canvas:      #0b0d10;
    --surface-1:   #111318;
    --surface-2:   #16191f;
    --border-sub:  #1c1f26;
    --border-mid:  #252a35;
    --accent:      #2dd4bf;
    --accent-dim:  #14b8a6;
    --good:   #34d399;
    --bad:    #f87171;
    --font-sans: 'Inter', ui-sans-serif, system-ui, sans-serif;
    --font-mono: 'JetBrains Mono', ui-monospace, monospace;
    --shadow-card: 0 2px 8px rgba(0,0,0,.45), 0 0 0 1px var(--border-sub);
    --r-sm: 8px;
    --r-md: 11px;
  }

  * { box-sizing: border-box; }
  body {
    font-family: var(--font-sans);
    background: var(--canvas);
    color: #d4d9e8;
    margin: 0;
    padding: 20px;
  }
  h1 { font-size: 16px; font-weight: 600; margin: 0 0 16px; letter-spacing: -.01em; color: #e8ecf4; }
  .empty { color: #4b5263; padding: 40px; text-align: center; font-size: 13px; }
  .rec {
    background: var(--surface-1);
    border: 1px solid var(--border-sub);
    border-radius: var(--r-md);
    padding: 12px 16px;
    margin-bottom: 10px;
    display: flex;
    gap: 12px;
    align-items: center;
    flex-wrap: wrap;
    box-shadow: var(--shadow-card);
    transition: border-color 180ms ease;
  }
  .rec:hover { border-color: var(--border-mid); }
  .rec .name { font-size: 14px; flex: 1; word-break: break-all; }
  .rec .meta { font-size: 11px; color: #6b7280; font-family: var(--font-mono); }
  .rec audio { width: 100%; max-width: 480px; accent-color: var(--accent); }
  .rec a { color: var(--accent-dim); font-size: 12px; text-decoration: none; }
  .rec a:hover { color: var(--accent); text-decoration: underline; }
  .active {
    background: #0d2a1f;
    border: 1px solid #1a5a3a;
    color: var(--good);
    padding: 10px 14px;
    margin-bottom: 14px;
    border-radius: var(--r-sm);
    font-size: 13px;
  }
</style>
</head>
<body>
<h1>🎙️ Lumina Recordings</h1>
<div id="active-host"></div>
<div id="list">Loading…</div>
<script>
async function load() {
  const r = await fetch('/recordings');
  const d = await r.json();
  const list = document.getElementById('list');
  const active = document.getElementById('active-host');

  if (d.active) {
    active.innerHTML = `<div class="active">🔴 Recording in progress — ${d.active.label || 'unlabeled'} (started ${d.active.started_at}). Use the Record/Stop button on the LiveKit page.</div>`;
  } else {
    active.innerHTML = '';
  }

  if (!d.recordings.length) {
    list.innerHTML = '<div class="empty">No recordings yet. Hit "Record" on the LiveKit page to capture Lumina\'s audio.</div>';
    return;
  }

  list.innerHTML = '';
  for (const r of d.recordings) {
    const div = document.createElement('div');
    div.className = 'rec';
    const sizeMb = (r.size_bytes / 1024 / 1024).toFixed(2);
    div.innerHTML = `
      <div class="name"><strong>${r.name}</strong>
        <div class="meta">${r.modified.replace('T', ' ').slice(0,19)} · ${sizeMb} MB</div>
      </div>
      <audio controls preload="none" src="${r.url}"></audio>
      <a href="${r.url}" download>⬇ download</a>
    `;
    list.appendChild(div);
  }
}
load();
setInterval(load, 5000);
</script>
</body>
</html>
