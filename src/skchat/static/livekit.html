<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>SKChat · LiveKit</title>
<meta name="viewport" content="width=device-width,initial-scale=1" />
<!-- D3: Excalidraw CDN deps — React 18 + ReactDOM + Excalidraw UMD bundle.
     Excalidraw requires React in scope as window.React / window.ReactDOM before
     its UMD bundle loads. We use the latest 0.17.x release pinned to avoid
     breaking changes; bump deliberately. -->
<script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
<script src="https://unpkg.com/@excalidraw/excalidraw@0.17.6/dist/excalidraw.production.min.js" crossorigin></script>
<!-- 2027 design system: Inter + JetBrains Mono from Google Fonts CDN -->
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
<style>
  /* ── 2027 Design System tokens ──────────────────────────────────────────────
     Flat-with-depth (NEVER glass/blur). One teal accent. Blue = self only.
     Near-black #0b0d10 canvas. Inter + JetBrains Mono.
     Motion: rise 220ms / expand 180ms / pulse 1s.
     ──────────────────────────────────────────────────────────────────────── */
  :root {
    color-scheme: dark;
    /* Canvas + surface layers */
    --canvas:      #0b0d10;
    --surface-1:   #111318;   /* tile / panel bg */
    --surface-2:   #16191f;   /* input / pill bg */
    --surface-3:   #1d2029;   /* header row bg */
    /* Borders (hairline) */
    --border-sub:  #1c1f26;   /* subtle divider */
    --border-mid:  #252a35;   /* default input/panel border */
    --border-hi:   #343a4a;   /* hover / focused border */
    /* Accent: ONE teal */
    --accent:      #2dd4bf;
    --accent-dim:  #14b8a6;
    --accent-mute: #0d7a6e22; /* tint bg for active pills */
    /* Blue = self / local only */
    --self-blue:   #3b82f6;
    --self-blue-dim: #2563eb;
    --self-bubble: #142140;   /* chat bubble bg for self */
    /* Semantic */
    --good:   #34d399;
    --bad:    #f87171;
    --warn:   #fbbf24;
    --screen: #a78bfa;        /* purple-ish for screen-share badge */
    /* Typography */
    --font-sans: 'Inter', ui-sans-serif, system-ui, sans-serif;
    --font-mono: 'JetBrains Mono', ui-monospace, monospace;
    /* Elevation (flat-with-depth — soft shadow, no blur) */
    --shadow-card: 0 2px 8px rgba(0,0,0,.45), 0 0 0 1px var(--border-sub);
    --shadow-panel:0 4px 16px rgba(0,0,0,.5), 0 0 0 1px var(--border-mid);
    /* Motion */
    --t-rise:   220ms;
    --t-expand: 180ms;
    --t-pulse:  1s;
    /* Radius */
    --r-sm:  8px;
    --r-md:  11px;
    --r-lg:  13px;
    --r-xl:  14px;
  }

  * { box-sizing: border-box; }

  body {
    font-family: var(--font-sans);
    background: var(--canvas);
    color: #d4d9e8;
    margin: 0; padding: 0;
    min-height: 100vh;
    /* NO backdrop-filter anywhere — flat-with-depth discipline */
  }

  /* ── Header ──────────────────────────────────────────────────────────────── */
  header {
    padding: 11px 16px;
    border-bottom: 1px solid var(--border-sub);
    display: flex; gap: 10px; align-items: center; flex-wrap: wrap;
    position: sticky; top: 0;
    background: var(--canvas);
    box-shadow: 0 1px 0 var(--border-sub), 0 2px 8px rgba(0,0,0,.35);
    z-index: 20;
  }
  header h1 {
    font-size: 14px; margin: 0; font-weight: 600;
    white-space: nowrap; letter-spacing: -.01em;
    color: #e8ecf4;
  }

  /* ── Form controls ───────────────────────────────────────────────────────── */
  .field { display: flex; flex-direction: column; gap: 2px; }
  .field label {
    font-size: 10px; color: #6b7280;
    text-transform: uppercase; letter-spacing: .06em;
    font-weight: 500;
  }
  input, select, button {
    background: var(--surface-2);
    color: #d4d9e8;
    border: 1px solid var(--border-mid);
    padding: 6px 10px;
    border-radius: var(--r-sm);
    font: inherit; font-size: 13px;
    transition: border-color var(--t-expand) ease, background var(--t-expand) ease;
  }
  input:focus, select:focus {
    outline: none;
    border-color: var(--accent);
    background: var(--surface-3);
  }
  button { cursor: pointer; }
  button:hover:not(:disabled) { border-color: var(--accent); }
  button:disabled { opacity: .4; cursor: not-allowed; }

  button.primary {
    background: var(--accent-dim);
    border-color: var(--accent-dim);
    color: #0b0d10;
    font-weight: 600;
  }
  button.primary:hover:not(:disabled) {
    background: var(--accent);
    border-color: var(--accent);
  }
  button.danger  { border-color: #5a2a2a; }
  button.danger:hover:not(:disabled) { border-color: var(--bad); }

  button.toggle.on  { background: var(--accent-mute); border-color: var(--accent); color: var(--accent); }
  button.toggle.off { background: var(--surface-2);   border-color: var(--border-mid); color: #6b7280; }

  /* ── Status indicator ────────────────────────────────────────────────────── */
  #status {
    font-size: 12px; color: #6b7280;
    margin-left: auto; display: flex; align-items: center; gap: 6px;
    font-variant-numeric: tabular-nums;
  }
  #status .dot { width: 7px; height: 7px; border-radius: 50%; background: #3a3f4e; flex-shrink:0; }
  #status.connected   .dot { background: var(--good);  box-shadow: 0 0 5px var(--good); }
  #status.connecting  .dot { background: var(--warn);  animation: pulse var(--t-pulse) infinite; }

  @keyframes pulse   { 50% { opacity: .35; } }

  /* ── Rise animation (panels, chat messages) ──────────────────────────────── */
  @keyframes rise {
    from { opacity: 0; transform: translateY(6px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  /* ── Layout ──────────────────────────────────────────────────────────────── */
  main { padding: 14px; max-width: 1400px; margin: 0 auto; }

  .banner {
    padding: 11px 14px; border-radius: var(--r-md);
    margin-bottom: 14px; font-size: 13px; line-height: 1.5;
    animation: rise var(--t-rise) ease both;
  }
  .banner.warn  { background: #2c2110; border: 1px solid #6b4c1c; color: #f5d9a0; }
  .banner.error { background: #2a1212; border: 1px solid #7a2626; color: #f5b8b8; }
  .banner code  { font-family: var(--font-mono); background: rgba(0,0,0,.4); padding: 1px 6px; border-radius: 4px; font-size: 11px; }

  .controls { display: flex; gap: 8px; padding: 10px 0; flex-wrap: wrap; align-items: center; }
  .controls.hidden { display: none; }

  /* ── Video grid ──────────────────────────────────────────────────────────── */
  #grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(min(300px, 100%), 1fr)); gap: 10px; }

  .tile {
    background: var(--surface-1);
    border: 1px solid var(--border-sub);
    border-radius: var(--r-xl);
    overflow: hidden; position: relative;
    aspect-ratio: 16/9;
    box-shadow: var(--shadow-card);
    transition: border-color var(--t-expand) ease, box-shadow var(--t-expand) ease;
    animation: rise var(--t-rise) ease both;
  }
  .tile:hover { border-color: var(--border-hi); }

  /* "self" tile gets a blue tint border to distinguish local from remote */
  .tile.self-tile { border-color: color-mix(in srgb, var(--self-blue) 40%, transparent); }
  .tile.self-tile:hover { border-color: var(--self-blue); }

  /* Screen-share tile gets a subtle purple tint */
  .tile.screenshare-tile { border-color: color-mix(in srgb, var(--screen) 40%, transparent); }
  .tile.screenshare-tile:hover { border-color: var(--screen); }

  .tile video {
    width: 100%; height: 100%;
    object-fit: cover; background: #000; display: block;
  }
  .tile .placeholder {
    width: 100%; height: 100%;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    gap: 6px;
    background: var(--surface-1);
    color: #4b5263; font-size: 12px;
  }
  .tile .placeholder .glyph { font-size: 40px; opacity: .5; }

  .tile .label {
    position: absolute; bottom: 6px; left: 8px;
    font-size: 11px; font-weight: 500;
    background: rgba(11,13,16,.75);
    color: #c8cedd;
    padding: 3px 8px; border-radius: 5px;
    border: 1px solid var(--border-sub);
  }
  .tile .badge {
    position: absolute; top: 6px; right: 8px;
    font-size: 10px; font-weight: 600;
    background: var(--accent-mute); color: var(--accent);
    border: 1px solid color-mix(in srgb, var(--accent) 30%, transparent);
    padding: 2px 7px; border-radius: 99px;
  }
  /* Screen-share badge */
  .tile .badge.screen-badge {
    background: rgba(167,139,250,.12);
    border-color: color-mix(in srgb, var(--screen) 30%, transparent);
    color: var(--screen);
  }
  .tile .mic-state    { position: absolute; bottom: 6px; right: 8px; font-size: 11px; }
  .tile .agent-state  {
    position: absolute; top: 6px; left: 8px; font-size: 11px;
    padding: 3px 8px; border-radius: 99px;
    background: rgba(11,13,16,.75);
    display: none; max-width: 80%; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  .tile .agent-state.show     { display: inline-block; }
  .tile .agent-state.thinking { background: #2c1e08; color: var(--warn); border: 1px solid #5c3e18; }
  .tile .agent-state.searching{ background: #101d2a; color: #60b4f0; border: 1px solid #1a3a54; }
  .tile .agent-state.speaking { background: #0d2a1f; color: var(--good); border: 1px solid #1a5a3a; }
  .tile .agent-state.listening{ background: #1c1030; color: #c084fc; border: 1px solid #3c1a60; }

  /* narrating: prominent, pulsing — long-running creative writing */
  .tile .agent-state.narrating {
    background: #2a1028; color: #f0abda; font-weight: 600;
    border: 1px solid #6b1f54;
    padding: 5px 12px;
    animation: narrate-pulse 1.4s ease-in-out infinite;
  }
  .tile .agent-state.anchoring { background: #2a2008; color: #f5d36a; font-weight: 600; border: 1px solid #6b4a18; }

  @keyframes narrate-pulse {
    0%,100% { box-shadow: 0 0 0 0 rgba(240,171,218,.4); }
    50%      { box-shadow: 0 0 10px 3px rgba(240,171,218,.2); }
  }

  /* "I'm done" button — visible while agent state is 'narrating' */
  .tile .done-btn {
    position: absolute; bottom: 6px; right: 8px;
    font-size: 13px; line-height: 1; padding: 5px 12px;
    border-radius: var(--r-sm);
    background: #2a1028; color: #f0d6ec;
    border: 1px solid #c07090; cursor: pointer; font-weight: 600;
    display: none;
    box-shadow: 0 0 6px rgba(192,112,144,.3);
    transition: background var(--t-expand) ease;
  }
  .tile .done-btn.show { display: inline-block; }
  .tile .done-btn:hover { background: #3f1840; }
  .tile:fullscreen .done-btn { font-size: 18px; padding: 10px 22px; bottom: 24px; right: 24px; }

  /* Fullscreen toggle */
  .tile .fs-btn {
    position: absolute; bottom: 6px; left: 8px;
    font-size: 14px; line-height: 1; padding: 4px 8px;
    border-radius: var(--r-sm);
    background: rgba(11,13,16,.6); color: #c8cedd;
    border: 1px solid var(--border-sub); cursor: pointer;
    opacity: 0.45;
    transition: opacity var(--t-expand) ease, background var(--t-expand) ease;
  }
  .tile:hover .fs-btn { opacity: 1; }
  .tile .fs-btn:hover { background: var(--surface-3); border-color: var(--border-hi); }

  /* Fullscreen overrides */
  .tile:fullscreen { background: #000; padding: 0; }
  .tile:fullscreen video { width: 100vw; height: 100vh; object-fit: contain; display: block !important; }
  .tile:fullscreen .placeholder { width: 100vw; height: 100vh; }
  .tile:fullscreen .placeholder .glyph { font-size: 120px; }
  .tile:fullscreen .label { font-size: 13px; bottom: 14px; }
  .tile:fullscreen .agent-state { font-size: 13px; padding: 6px 14px; }
  .tile:fullscreen .agent-state.narrating { font-size: 15px; padding: 8px 18px; }

  /* ── Meta row ────────────────────────────────────────────────────────────── */
  .meta { display: flex; gap: 6px; align-items: center; flex-wrap: wrap; }
  .pill {
    font-size: 11px; padding: 2px 8px;
    border-radius: 99px;
    background: var(--surface-2); border: 1px solid var(--border-mid);
    color: #8892a8;
  }

  /* ── Diagnostics log ─────────────────────────────────────────────────────── */
  details#log-wrap { margin-top: 14px; }
  details#log-wrap summary { font-size: 12px; color: #6b7280; cursor: pointer; padding: 4px 0; }
  pre#log {
    font-family: var(--font-mono); font-size: 11px;
    color: #6b7280; max-height: 200px; overflow: auto;
    background: var(--surface-1);
    border: 1px solid var(--border-sub);
    border-radius: var(--r-md);
    padding: 8px; margin: 6px 0 0;
    white-space: pre-wrap; word-break: break-word;
  }

  /* ── Shared panel base — flat-with-depth; NO glass/blur ──────────────────── */
  .sk-panel {
    background: var(--surface-1);
    border: 1px solid var(--border-mid);
    border-radius: var(--r-xl);
    box-shadow: var(--shadow-panel);
    margin-top: 14px; overflow: hidden;
    transition: height var(--t-expand) ease;
    animation: rise var(--t-rise) ease both;
  }
  .sk-panel.collapsed { height: 40px; }

  .sk-panel-header {
    display: flex; align-items: center; gap: 8px;
    padding: 8px 12px; cursor: pointer; user-select: none;
    border-bottom: 1px solid var(--border-sub);
    background: var(--surface-3);
    font-size: 13px; font-weight: 600; flex-shrink: 0;
    color: #c8cedd;
    transition: background var(--t-expand) ease;
  }
  .sk-panel-header:hover { background: var(--surface-2); }
  .sk-panel.collapsed .sk-panel-header { border-bottom: none; }
  .sk-panel-header .toggle-icon { margin-left: auto; font-size: 11px; color: #6b7280; }

  /* ── D2: In-call chat panel ──────────────────────────────────────────────── */
  #chat-panel { display: flex; flex-direction: column; }

  #chat-unread-badge {
    background: var(--accent-dim); color: #0b0d10;
    border-radius: 99px; font-size: 10px; font-weight: 700;
    padding: 1px 6px; display: none;
  }
  #chat-unread-badge.show { display: inline-block; }

  #chat-messages {
    flex: 1; overflow-y: auto; padding: 10px 12px;
    display: flex; flex-direction: column; gap: 6px;
    min-height: 160px; max-height: 260px;
  }
  .chat-msg {
    font-size: 13px; line-height: 1.5;
    padding: 7px 11px; border-radius: var(--r-md);
    max-width: 85%; word-break: break-word;
    animation: rise var(--t-rise) ease both;
  }
  /* "mine" = blue (self); "theirs" = flat surface */
  .chat-msg.mine   { background: var(--self-bubble); color: #9bbfe0; align-self: flex-end; border: 1px solid color-mix(in srgb, var(--self-blue) 20%, transparent); }
  .chat-msg.theirs { background: var(--surface-2);   color: #d4d9e8; align-self: flex-start; border: 1px solid var(--border-sub); }
  .chat-msg .chat-meta { font-size: 10px; color: #4b5263; margin-bottom: 3px; font-family: var(--font-mono); }

  #chat-input-row {
    display: flex; gap: 6px; padding: 8px 10px;
    border-top: 1px solid var(--border-sub); flex-shrink: 0;
    background: var(--surface-3);
  }
  #chat-input  { flex: 1; min-width: 0; }
  #chat-send   { padding: 6px 14px; }

  /* ── D3: Excalidraw whiteboard panel ─────────────────────────────────────── */
  #wb-container {
    width: 100%; height: 500px; background: #fff;
    /* Excalidraw renders its own dark mode; height tunable */
  }
  #wb-status { font-size: 11px; color: #6b7280; padding: 4px 12px; flex-shrink: 0; }

  /* ── D4: Screen-share + Watch-together panels ────────────────────────────── */
  #watch-panel { display: flex; flex-direction: column; }

  #watch-url-row {
    display: flex; gap: 8px; padding: 10px 12px;
    border-top: 1px solid var(--border-sub);
    background: var(--surface-3); flex-shrink: 0;
    flex-wrap: wrap; align-items: center;
  }
  #watch-url { flex: 1; min-width: 180px; font-family: var(--font-mono); font-size: 12px; }
  #watch-controls {
    display: flex; gap: 6px; padding: 8px 12px;
    border-top: 1px solid var(--border-sub);
    background: var(--surface-3); flex-shrink: 0;
    flex-wrap: wrap; align-items: center;
  }
  #watch-video-wrap {
    background: #000; display: flex; align-items: center; justify-content: center;
    min-height: 240px; position: relative;
  }
  #watch-video {
    max-width: 100%; max-height: 420px;
    width: 100%; display: none;
    background: #000;
  }
  #watch-placeholder {
    position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%);
    color: #4b5263; font-size: 13px; text-align: center; pointer-events: none;
  }
  #watch-placeholder .glyph { font-size: 36px; display: block; margin-bottom: 6px; opacity: .5; }

  #watch-status-bar {
    display: flex; gap: 8px; align-items: center;
    padding: 6px 12px;
    border-top: 1px solid var(--border-sub);
    background: var(--surface-3);
    font-size: 11px; color: #6b7280;
    font-family: var(--font-mono);
    flex-shrink: 0;
  }

  /* Screen-share not-supported banner — inline */
  #screen-unsupported-msg {
    font-size: 12px; color: var(--warn);
    padding: 4px 0; display: none;
  }
  #screen-unsupported-msg.show { display: inline; }

  /* ── Responsive ──────────────────────────────────────────────────────────── */
  @media (max-width: 640px) {
    header { padding: 8px 10px; gap: 6px; }
    header h1 { font-size: 13px; }
    .field label { display: none; }
    main { padding: 8px; }
    #status { width: 100%; margin-left: 0; order: 99; font-size: 11px; }
    #wb-container { height: 300px; }
    #watch-video { max-height: 240px; }
  }
</style>
</head>
<body>
<header>
  <h1>SKChat · LiveKit</h1>
  <div class="field"><label>Room</label><input id="room" placeholder="lumina-and-chef" size="18" /></div>
  <div class="field"><label>You</label><input id="identity" placeholder="chef" size="10" /></div>
  <button id="connect" class="primary">Connect</button>
  <button id="leave" class="danger" disabled>Leave</button>
  <span id="status"><span class="dot"></span><span id="status-text">checking…</span></span>
</header>

<main>
  <div id="banner-host"></div>

  <div id="controls" class="controls hidden">
    <button id="mic-toggle"   class="toggle off">🎤 Mic OFF</button>
    <button id="cam-toggle"   class="toggle off">📷 Cam OFF</button>
    <select id="mic-select" title="Microphone"></select>
    <select id="cam-select"  title="Camera"></select>
    <span class="pill" id="room-pill"></span>
    <span class="pill" id="peers-pill">0 peers</span>
  </div>

  <div id="speak-row" class="controls hidden">
    <input id="speak-text" placeholder="Make Lumina say…" style="flex:1;min-width:200px" />
    <button id="speak-send">🤖 Speak</button>
    <button id="record-toggle">🎙️ Record</button>
    <button id="chat-toggle-btn"   class="toggle off" title="Toggle in-call chat panel">💬 Chat</button>
    <button id="wb-toggle-btn"     class="toggle off" title="Toggle whiteboard panel">📋 Board</button>
    <!-- D4: Screen share + Watch-together toggles -->
    <button id="screen-share-btn"  class="toggle off" title="Share your screen">🖥️ Screen</button>
    <button id="watch-toggle-btn"  class="toggle off" title="Watch-together panel">📺 Watch</button>
    <span id="screen-unsupported-msg" class="show" style="display:none">Screen share not supported in this browser</span>
    <a id="recordings-link" class="pill" href="/recordings.html" target="_blank" style="text-decoration:none">📁 Library</a>
  </div>

  <div id="grid"></div>

  <!-- D2: In-call chat panel -->
  <div id="chat-panel" class="sk-panel collapsed" style="display:none">
    <div id="chat-panel-header" class="sk-panel-header">
      💬 In-call Chat
      <span id="chat-unread-badge"></span>
      <span class="toggle-icon" id="chat-chevron">▼</span>
    </div>
    <div id="chat-messages"></div>
    <div id="chat-input-row">
      <input id="chat-input" placeholder="Message everyone in this call…" autocomplete="off" />
      <button id="chat-send" class="primary">Send</button>
    </div>
  </div>

  <!-- D3: Excalidraw whiteboard panel -->
  <div id="wb-panel" class="sk-panel collapsed" style="display:none">
    <div id="wb-panel-header" class="sk-panel-header">
      📋 Whiteboard
      <span id="wb-status-pill" class="pill" style="font-size:10px;margin-left:4px">idle</span>
      <span class="toggle-icon" id="wb-chevron">▼</span>
    </div>
    <div id="wb-container">
      <!-- Excalidraw mounts here via React.createElement + ReactDOM.createRoot -->
    </div>
  </div>

  <!-- D4a: Watch-together panel (sovereign path) ─────────────────────────────
       Publishes/consumes {lane:"watch", url, action:"load"|"play"|"pause"|"seek", t}
       over the existing data-lane router. The <video> element is driven in lockstep
       by the remote host; local viewers are listeners unless they are the host.
       TODO: host election (currently whoever loaded last URL is host — simple);
             progress bar UI; subtitle/chapter lane; relay via HTTP for cross-NAT
  ─────────────────────────────────────────────────────────────────────────── -->
  <div id="watch-panel" class="sk-panel collapsed" style="display:none">
    <div id="watch-panel-header" class="sk-panel-header">
      📺 Watch Together
      <span id="watch-status-pill" class="pill" style="font-size:10px;margin-left:4px">idle</span>
      <span class="toggle-icon" id="watch-chevron">▼</span>
    </div>
    <div id="watch-video-wrap">
      <video id="watch-video" controls preload="metadata"></video>
      <div id="watch-placeholder">
        <span class="glyph">📺</span>
        Paste a video URL above and click Load to share with everyone in the room
      </div>
    </div>
    <div id="watch-url-row">
      <input id="watch-url" placeholder="https://…/video.mp4  (direct mp4/webm/ogg URL)" />
      <button id="watch-load-btn" class="primary">Load &amp; Share</button>
    </div>
    <div id="watch-controls">
      <button id="watch-play-btn"  disabled>▶ Play</button>
      <button id="watch-pause-btn" disabled>⏸ Pause</button>
      <button id="watch-sync-btn"  disabled title="Sync your position to the host's timestamp">⇄ Sync</button>
      <span id="watch-host-label" class="pill" style="display:none">host</span>
      <span id="watch-time-display" style="font-family:var(--font-mono);font-size:12px;color:#6b7280;margin-left:auto"></span>
    </div>
    <div id="watch-status-bar">
      <span id="watch-log"></span>
    </div>
  </div>

  <details id="log-wrap"><summary>Diagnostics</summary><pre id="log"></pre></details>
</main>

<script type="module">
import { Room, RoomEvent, Track, createLocalAudioTrack, createLocalVideoTrack, LocalTrack, TrackPublishOptions }
  from 'https://cdn.jsdelivr.net/npm/livekit-client@2.6.0/+esm';

const $ = s => document.querySelector(s);
const logEl = $('#log');
const log = (...a) => {
  const line = a.map(x => typeof x === 'string' ? x : JSON.stringify(x)).join(' ');
  logEl.textContent += line + '\n';
  logEl.scrollTop = logEl.scrollHeight;
  console.log('[skchat]', ...a);
};

let room = null;
const tiles = new Map();
let micTrack = null, camTrack = null;
let qpIdentity = null, qpToken = null;

// ── Data-lane envelope ────────────────────────────────────────────────────────
// All data-channel messages: { lane, ...payload }
// Lanes:
//   "chat"       → {from, text, ts}
//   "whiteboard" → {elements, appState}
//   "speak"      → {action} or {action, text, …}  (legacy + agent control)
//   "watch"      → {url?, action:"load"|"play"|"pause"|"seek", t?}  ← D4
// Legacy un-laned messages treated as lane "speak" for backwards compat.
function publishLane(lanePayload) {
  if (!room || !room.localParticipant) return;
  const bytes = new TextEncoder().encode(JSON.stringify(lanePayload));
  return room.localParticipant.publishData(bytes, { reliable: true });
}

function routeDataMessage(raw, participant) {
  let msg;
  try { msg = JSON.parse(new TextDecoder().decode(raw)); } catch (e) { return; }
  const lane = msg.lane || 'speak';
  if      (lane === 'chat')       onChatReceived(msg, participant);
  else if (lane === 'whiteboard') onWhiteboardReceived(msg);
  else if (lane === 'watch')      onWatchReceived(msg, participant);
  else {
    // lane === 'speak' or legacy agent control messages
    log('data [speak]', JSON.stringify(msg).slice(0, 120));
  }
}

// ── D2: Chat panel ────────────────────────────────────────────────────────────
let chatOpen = false, chatUnread = 0;

function escapeHtml(s) {
  return String(s)
    .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
    .replace(/"/g,'&quot;').replace(/'/g,'&#39;');
}

function setChatOpen(open) {
  chatOpen = open;
  const panel = $('#chat-panel');
  if (open) {
    panel.classList.remove('collapsed');
    chatUnread = 0;
    const badge = $('#chat-unread-badge');
    badge.textContent = ''; badge.classList.remove('show');
    $('#chat-chevron').textContent = '▲';
    const btn = $('#chat-toggle-btn');
    btn.classList.remove('off'); btn.classList.add('on');
    const msgs = $('#chat-messages');
    msgs.scrollTop = msgs.scrollHeight;
  } else {
    panel.classList.add('collapsed');
    $('#chat-chevron').textContent = '▼';
    const btn = $('#chat-toggle-btn');
    btn.classList.remove('on'); btn.classList.add('off');
  }
}

function appendChatMessage(from, text, ts, mine) {
  const msgs = $('#chat-messages');
  const div = document.createElement('div');
  div.className = 'chat-msg ' + (mine ? 'mine' : 'theirs');
  const time = new Date(ts).toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'});
  div.innerHTML = `<div class="chat-meta">${escapeHtml(from)} · ${escapeHtml(time)}</div>${escapeHtml(text)}`;
  msgs.appendChild(div);
  msgs.scrollTop = msgs.scrollHeight;
}

function onChatReceived(msg, participant) {
  const from = msg.from || (participant ? participant.identity : 'unknown');
  const text = msg.text || '';
  const ts   = msg.ts   || Date.now();
  const mine = from === (room?.localParticipant?.identity || '');
  appendChatMessage(from, text, ts, mine);
  if (!chatOpen) {
    chatUnread++;
    const badge = $('#chat-unread-badge');
    badge.textContent = chatUnread; badge.classList.add('show');
  }
  log(`data [chat] ${from}: ${text.slice(0, 60)}`);
  // TODO: persist to skchat history under room FQID (D2 follow-up)
}

async function sendChatMessage() {
  const input = $('#chat-input');
  const text  = input.value.trim();
  if (!text || !room) return;
  const from = room.localParticipant.identity || 'me';
  const ts   = Date.now();
  const msg  = { lane: 'chat', from, text, ts };
  try {
    await publishLane(msg);
    appendChatMessage(from, text, ts, true);
    input.value = '';
  } catch (e) { log('chat send failed:', e.message); }
}

// ── D3: Excalidraw whiteboard ─────────────────────────────────────────────────
let wbOpen = false;
let excalidrawAPI = null;
let wbDebounceTimer = null;
const WB_DEBOUNCE_MS = 400;
let wbIgnoreNextUpdate = false;

function setWbOpen(open) {
  wbOpen = open;
  const panel = $('#wb-panel');
  if (open) {
    panel.classList.remove('collapsed');
    $('#wb-chevron').textContent = '▲';
    const btn = $('#wb-toggle-btn');
    btn.classList.remove('off'); btn.classList.add('on');
    if (!excalidrawAPI) mountExcalidraw();
  } else {
    panel.classList.add('collapsed');
    $('#wb-chevron').textContent = '▼';
    const btn = $('#wb-toggle-btn');
    btn.classList.remove('on'); btn.classList.add('off');
  }
}

function setWbStatus(text) {
  const pill = $('#wb-status-pill');
  if (pill) pill.textContent = text;
}

function mountExcalidraw() {
  if (!window.React || !window.ReactDOM || !window.ExcalidrawLib) {
    setWbStatus('CDN not loaded');
    log('wb: Excalidraw CDN not ready — React/ReactDOM/ExcalidrawLib missing');
    return;
  }
  const container = $('#wb-container');
  if (!container) return;
  const { Excalidraw } = window.ExcalidrawLib;
  function WhiteboardApp() {
    return React.createElement(Excalidraw, {
      excalidrawAPI: (api) => { excalidrawAPI = api; setWbStatus('ready'); },
      theme: 'dark',
      onChange: (_elements, _appState, _files) => {
        if (wbIgnoreNextUpdate) { wbIgnoreNextUpdate = false; return; }
        if (!room) return;
        clearTimeout(wbDebounceTimer);
        wbDebounceTimer = setTimeout(() => {
          if (!excalidrawAPI) return;
          const elements   = excalidrawAPI.getSceneElements();
          const appState   = excalidrawAPI.getAppState();
          const wireAppState = {
            viewBackgroundColor: appState.viewBackgroundColor,
            zoom: appState.zoom, scrollX: appState.scrollX, scrollY: appState.scrollY,
          };
          publishLane({ lane: 'whiteboard', elements, appState: wireAppState })
            .catch(e => log('wb publish failed:', e.message));
          setWbStatus('synced');
        }, WB_DEBOUNCE_MS);
      },
    });
  }
  try {
    const root = ReactDOM.createRoot(container);
    root.render(React.createElement(WhiteboardApp));
    setWbStatus('mounting…');
    log('wb: Excalidraw mounted');
  } catch (e) {
    setWbStatus('mount error');
    log('wb mount error:', e.message);
  }
  // TODO: Yjs CRDT lane (D6b) for true OT; file/image chunk protocol; pointer broadcast
}

function onWhiteboardReceived(msg) {
  if (!excalidrawAPI) return;
  wbIgnoreNextUpdate = true;
  try {
    excalidrawAPI.updateScene({ elements: msg.elements || [], appState: msg.appState || {} });
    setWbStatus('synced');
  } catch (e) { log('wb updateScene failed:', e.message); }
}

// ── D4a: Screen share ─────────────────────────────────────────────────────────
// Publishes getDisplayMedia() as a LiveKit ScreenShare track.
// The receiving side picks it up via TrackSubscribed → attachTrack() which
// already handles any Track.Kind.Video — we just render it as a special tile
// with a purple tinted border + "screen — <name>" label.
//
// ALTERNATIVE PATH: The user can also just open a video in a browser tab,
// start screen sharing, and select that tab. The watch-together (lane:"watch")
// below is the sovereign path for synced playback without screen-sharing a window.

let screenTrack = null;          // LocalTrack for the screen share
let screenSharing = false;

function setScreenShareUI(active) {
  screenSharing = active;
  const btn = $('#screen-share-btn');
  if (active) {
    btn.classList.remove('off'); btn.classList.add('on');
    btn.textContent = '🖥️ Stop Share';
  } else {
    btn.classList.remove('on'); btn.classList.add('off');
    btn.textContent = '🖥️ Screen';
  }
}

async function startScreenShare() {
  if (!room) { showError('Connect to a room first.'); return; }

  // Browser support check
  if (!navigator.mediaDevices?.getDisplayMedia) {
    const msg = $('#screen-unsupported-msg');
    msg.classList.add('show');
    msg.style.display = 'inline';
    log('screen share: getDisplayMedia not supported in this browser');
    return;
  }

  try {
    log('screen share: requesting display media…');
    const stream = await navigator.mediaDevices.getDisplayMedia({
      video: { frameRate: { ideal: 15, max: 30 }, cursor: 'always' },
      audio: false,   // system audio capture is browser/OS dependent; omit for compat
    });
    const videoTrack = stream.getVideoTracks()[0];
    if (!videoTrack) { log('screen share: no video track obtained'); return; }

    // Publish to LiveKit as a ScreenShare source
    await room.localParticipant.publishTrack(videoTrack, {
      source: Track.Source.ScreenShare,
      name: 'screenshare',
      simulcast: false,
    });

    screenTrack = videoTrack;
    setScreenShareUI(true);
    log('screen share: published');

    // If the user stops via browser UI (OS-level "Stop sharing" button), clean up
    videoTrack.addEventListener('ended', () => {
      log('screen share: ended by browser/OS');
      stopScreenShare(/*alreadyStopped=*/ true);
    });
  } catch (e) {
    if (e.name === 'NotAllowedError' || e.name === 'PermissionDeniedError') {
      log('screen share: user denied permission');
      // Not an error worth showing a banner for; just log
    } else {
      log('screen share error:', e.name, e.message);
      showError(`Screen share failed: ${e.message}`);
    }
  }
}

async function stopScreenShare(alreadyStopped = false) {
  if (!screenTrack) return;
  try {
    if (!alreadyStopped) screenTrack.stop();
    // Unpublish from LiveKit
    const pub = room?.localParticipant?.getTrackPublications?.()
      ? [...room.localParticipant.trackPublications.values()]
            .find(p => p.track === screenTrack || p.source === Track.Source.ScreenShare)
      : null;
    if (pub) await room.localParticipant.unpublishTrack(screenTrack);
  } catch (e) { log('stopScreenShare error:', e.message); }
  screenTrack = null;
  setScreenShareUI(false);
  log('screen share: stopped');
}

async function toggleScreenShare() {
  if (screenSharing) {
    await stopScreenShare();
  } else {
    await startScreenShare();
  }
}

// ── D4b: Watch-together (sovereign path) ─────────────────────────────────────
// Data-lane envelope shape:
//   { lane:"watch", action:"load",  url:"https://…/video.mp4" }
//   { lane:"watch", action:"play",  t:<seconds> }
//   { lane:"watch", action:"pause", t:<seconds> }
//   { lane:"watch", action:"seek",  t:<seconds> }
//
// Protocol:
//   - Any peer can become "host" by loading + sharing a URL (action:"load").
//   - The host drives play/pause/seek; other peers follow passively.
//   - "⇄ Sync" lets a latecomer jump to the host's last broadcast timestamp.
//   - A peer can click play/pause locally (they drive but shouldn't in listener mode);
//     TODO: formal host-election protocol for multi-peer sessions.
//
// NOTE: This requires a direct-link mp4/webm/ogg URL. YouTube/Twitch/etc. won't work
// via <video> src due to CORS. For those, use the screen-share path instead.

let watchOpen = false;
let watchIsHost = false;         // true if we loaded + published the current URL
let watchHostTs = 0;             // last broadcast timestamp from the host
let watchHostId = null;          // identity of the current host
let watchIgnoreEvents = false;   // suppress echoing our own seeks back to the room
const watchEl = () => $('#watch-video');

function setWatchOpen(open) {
  watchOpen = open;
  const panel = $('#watch-panel');
  if (open) {
    panel.classList.remove('collapsed');
    $('#watch-chevron').textContent = '▲';
    const btn = $('#watch-toggle-btn');
    btn.classList.remove('off'); btn.classList.add('on');
  } else {
    panel.classList.add('collapsed');
    $('#watch-chevron').textContent = '▼';
    const btn = $('#watch-toggle-btn');
    btn.classList.remove('on'); btn.classList.add('off');
  }
}

function setWatchStatus(text) {
  const pill = $('#watch-status-pill');
  if (pill) pill.textContent = text;
  const log2 = $('#watch-log');
  if (log2) log2.textContent = text;
}

function watchUpdateTime() {
  const v = watchEl();
  const el = $('#watch-time-display');
  if (!el || !v || isNaN(v.duration)) return;
  const fmt = s => `${String(Math.floor(s/60)).padStart(2,'0')}:${String(Math.floor(s%60)).padStart(2,'0')}`;
  el.textContent = `${fmt(v.currentTime)} / ${fmt(v.duration)}`;
}

function watchSetButtons(loaded) {
  $('#watch-play-btn').disabled  = !loaded;
  $('#watch-pause-btn').disabled = !loaded;
  $('#watch-sync-btn').disabled  = !loaded;
}

async function watchLoadAndShare() {
  const url = $('#watch-url').value.trim();
  if (!url) return;
  const v = watchEl();
  v.src = url;
  v.style.display = 'block';
  $('#watch-placeholder').style.display = 'none';
  watchSetButtons(true);
  watchIsHost = true;
  watchHostId = room?.localParticipant?.identity || 'me';
  const hostLabel = $('#watch-host-label');
  hostLabel.style.display = 'inline-block';
  hostLabel.textContent = 'you are host';
  setWatchStatus('loaded · sharing');
  log('watch: loaded', url);
  // Broadcast URL to all peers so they can load the same file
  await publishLane({ lane: 'watch', action: 'load', url }).catch(e => log('watch publish failed:', e.message));
}

async function watchPlay() {
  const v = watchEl();
  if (!v.src) return;
  try {
    watchIgnoreEvents = true;
    await v.play();
    await publishLane({ lane: 'watch', action: 'play', t: v.currentTime });
    setWatchStatus('playing');
    watchIgnoreEvents = false;
  } catch (e) { log('watch play error:', e.message); watchIgnoreEvents = false; }
}

async function watchPause() {
  const v = watchEl();
  if (!v.src) return;
  v.pause();
  await publishLane({ lane: 'watch', action: 'pause', t: v.currentTime });
  setWatchStatus('paused');
}

function watchSync() {
  // Jump to host's last broadcast position
  if (!watchHostTs) { setWatchStatus('no host position known yet'); return; }
  const v = watchEl();
  if (!v.src) return;
  watchIgnoreEvents = true;
  v.currentTime = watchHostTs;
  setWatchStatus(`synced to ${watchHostTs.toFixed(1)}s`);
  watchIgnoreEvents = false;
}

async function onWatchReceived(msg, participant) {
  const sender = participant?.identity || 'unknown';
  log(`data [watch] ${sender}: ${msg.action}`);
  const v = watchEl();

  if (msg.action === 'load') {
    // Remote host is sharing a video — load same URL into our player
    if (msg.url) {
      v.src = msg.url;
      v.style.display = 'block';
      $('#watch-placeholder').style.display = 'none';
      $('#watch-url').value = msg.url;
      watchSetButtons(true);
      watchIsHost = false;
      watchHostId = sender;
      const hostLabel = $('#watch-host-label');
      hostLabel.style.display = 'inline-block';
      hostLabel.textContent = `host: ${sender}`;
      setWatchStatus(`loaded from ${sender}`);
      // Open the watch panel if it's not visible
      if (!watchOpen) { setWatchOpen(true); $('#watch-panel').style.display = 'flex'; }
    }
  } else if (msg.action === 'play') {
    watchHostTs = msg.t ?? v.currentTime;
    watchIgnoreEvents = true;
    if (Math.abs(v.currentTime - watchHostTs) > 1.5) v.currentTime = watchHostTs;
    try { await v.play(); setWatchStatus('playing (host)'); } catch(e) { setWatchStatus('waiting for interaction to play'); }
    watchIgnoreEvents = false;
  } else if (msg.action === 'pause') {
    watchHostTs = msg.t ?? v.currentTime;
    watchIgnoreEvents = true;
    v.pause();
    if (Math.abs(v.currentTime - watchHostTs) > 1.5) v.currentTime = watchHostTs;
    setWatchStatus(`paused at ${watchHostTs.toFixed(1)}s (host)`);
    watchIgnoreEvents = false;
  } else if (msg.action === 'seek') {
    watchHostTs = msg.t ?? 0;
    watchIgnoreEvents = true;
    v.currentTime = watchHostTs;
    setWatchStatus(`seeked to ${watchHostTs.toFixed(1)}s (host)`);
    watchIgnoreEvents = false;
  }
}

// Publish seek events when host scrubs the native video controls
function setupWatchVideoListeners() {
  const v = watchEl();
  v.addEventListener('timeupdate', watchUpdateTime);
  v.addEventListener('seeked', () => {
    if (watchIgnoreEvents || !watchIsHost || !room) return;
    publishLane({ lane: 'watch', action: 'seek', t: v.currentTime })
      .catch(e => log('watch seek publish failed:', e.message));
  });
}

// ── Pre-flight: secure context check ─────────────────────────────────────────
function preflight() {
  const host = $('#banner-host');
  host.innerHTML = '';
  if (!window.isSecureContext) {
    const b = document.createElement('div');
    b.className = 'banner warn';
    b.innerHTML = `
      <strong>Insecure context — mic/camera will be blocked by your browser.</strong><br>
      You're on <code>${location.protocol}//${location.host}</code>. Browsers only allow
      <code>getUserMedia</code> over HTTPS (except <code>localhost</code>). On a phone this is
      mandatory; on desktop Chrome you can bypass with
      <code>chrome://flags/#unsafely-treat-insecure-origin-as-secure</code> →
      add <code>${location.origin}</code>.<br>
      <strong>Recommended fix:</strong> on the server run
      <code>~/clawd/skcapstone-repos/skchat/scripts/setup-tls.sh</code>.
    `;
    host.appendChild(b);
    return false;
  }
  return true;
}

// ── Device enumeration ────────────────────────────────────────────────────────
async function enumerateDevices() {
  if (!navigator.mediaDevices?.enumerateDevices) return;
  try {
    const tmp = await navigator.mediaDevices.getUserMedia({ audio: true, video: true });
    tmp.getTracks().forEach(t => t.stop());
  } catch (e) { log('device prompt rejected:', e.name, e.message); }
  const devs = await navigator.mediaDevices.enumerateDevices();
  const mic = $('#mic-select'); mic.innerHTML = '';
  const cam = $('#cam-select'); cam.innerHTML = '';
  for (const d of devs) {
    if (d.kind === 'audioinput') {
      const o = document.createElement('option'); o.value = d.deviceId;
      o.textContent = d.label || `Mic ${mic.length + 1}`; mic.appendChild(o);
    } else if (d.kind === 'videoinput') {
      const o = document.createElement('option'); o.value = d.deviceId;
      o.textContent = d.label || `Cam ${cam.length + 1}`; cam.appendChild(o);
    }
  }
}

// ── Tiles ─────────────────────────────────────────────────────────────────────
function makeTile(participant, opts = {}) {
  // opts.screenShare = true → create a dedicated screen-share tile
  const tileKey = opts.screenShare ? `${participant.sid}:screen` : participant.sid;
  if (tiles.has(tileKey)) return tiles.get(tileKey);

  const div = document.createElement('div');
  div.className = 'tile';
  div.dataset.sid = tileKey;

  const isLocal = participant.isLocal;
  const isAgent = /^(lumina|agent:|jarvis|opus|artisan|herald|sentinel|architect|scholar|steward|coder)/i
    .test(participant.identity || '');

  if (opts.screenShare) {
    div.classList.add('screenshare-tile');
    const displayName = participant.name || participant.identity || 'unknown';
    div.innerHTML = `
      <div class="placeholder"><div class="glyph">🖥️</div><div>screen — ${escapeHtml(displayName)}</div></div>
      <video autoplay playsinline muted style="display:none"></video>
      <span class="label">screen — ${escapeHtml(displayName)}</span>
      <span class="badge screen-badge">🖥️ screen</span>
      <button class="fs-btn" title="Fullscreen" aria-label="Fullscreen">⛶</button>
    `;
  } else {
    if (isLocal) div.classList.add('self-tile');
    div.innerHTML = `
      <div class="placeholder"><div class="glyph">${isAgent ? '🤖' : (isLocal ? '🪞' : '👤')}</div><div>${escapeHtml(participant.name || participant.identity || 'unknown')}</div></div>
      <video autoplay playsinline ${isLocal ? 'muted' : ''} style="display:none"></video>
      <span class="label">${escapeHtml(participant.name || participant.identity)}${isLocal ? ' (you)' : ''}</span>
      ${isAgent ? '<span class="badge">🤖 agent</span>' : ''}
      <span class="agent-state" data-sid="${participant.sid}"></span>
      <span class="mic-state" data-sid="${participant.sid}">🔇</span>
      <button class="fs-btn" title="Fullscreen (Esc to exit)" aria-label="Fullscreen">⛶</button>
      <button class="done-btn" title="Stop the worship loop" aria-label="I'm done">❤️ I'm done</button>
    `;
  }

  // Fullscreen toggle
  const fsBtn = div.querySelector('.fs-btn');
  fsBtn.addEventListener('click', (ev) => {
    ev.stopPropagation();
    if (document.fullscreenElement === div) document.exitFullscreen();
    else div.requestFullscreen().catch(err => console.warn('fullscreen denied:', err));
  });

  // I'm done (worship) button — only in regular participant tiles
  if (!opts.screenShare) {
    const doneBtn = div.querySelector('.done-btn');
    doneBtn.addEventListener('click', async (ev) => {
      ev.stopPropagation();
      if (!room || !room.localParticipant) return;
      try {
        await publishLane({ lane: 'speak', action: 'worship_done' });
        doneBtn.classList.remove('show'); doneBtn.textContent = '💕 saved';
      } catch (err) { console.warn('worship_done send failed:', err); }
    });
    if (isAgent && participant.metadata) updateAgentState(participant);
  }

  $('#grid').appendChild(div);
  tiles.set(tileKey, div);
  return div;
}

function removeTile(sid) {
  // Remove both the regular tile and any screen-share tile
  for (const key of [`${sid}:screen`, sid]) {
    const t = tiles.get(key);
    if (t) { t.remove(); tiles.delete(key); }
  }
  const n = room ? room.remoteParticipants.size : 0;
  $('#peers-pill').textContent = `${n} peer${n === 1 ? '' : 's'}`;
}

function attachTrack(track, participant) {
  // Screen-share tracks get their own dedicated tile
  const isScreen = track.source === Track.Source.ScreenShare;
  const tile = makeTile(participant, { screenShare: isScreen });

  if (track.kind === Track.Kind.Video) {
    const video = tile.querySelector('video');
    const ph    = tile.querySelector('.placeholder');
    track.attach(video);
    video.style.display = 'block';
    // Mirror self-view; screen-share and remote tiles stay un-mirrored
    if (participant.isLocal && !isScreen) video.style.transform = 'scaleX(-1)';
    if (ph) ph.style.display = 'none';
  } else if (track.kind === Track.Kind.Audio && !participant.isLocal) {
    const el = track.attach();
    el.style.display = 'none';
    document.body.appendChild(el);
  }
}

function updateAgentState(participant) {
  const tile = tiles.get(participant.sid);
  if (!tile) return;
  const el = tile.querySelector('.agent-state');
  if (!el) return;
  let state = '', detail = '';
  try { const m = JSON.parse(participant.metadata || '{}'); state = m.state || ''; detail = m.detail || ''; } catch (e) {}
  el.classList.remove('show','thinking','searching','speaking','listening','narrating','anchoring');
  const doneBtn = tile.querySelector('.done-btn');
  if (doneBtn) {
    if (state === 'narrating') { doneBtn.classList.add('show'); doneBtn.textContent = "❤️ I'm done"; }
    else doneBtn.classList.remove('show');
  }
  if (!state || state === 'idle') return;
  const icon = { thinking:'💭', searching:'🔍', speaking:'🗣️', listening:'👂', narrating:'✍️', anchoring:'🌸' }[state] || '';
  el.classList.add('show', state);
  el.textContent = `${icon} ${detail || state}`;
}

function startMetadataPolling() {
  setInterval(() => {
    if (!room) return;
    for (const p of room.remoteParticipants.values()) if (p.metadata) updateAgentState(p);
  }, 500);
}

function detachTrack(track, participant) {
  const isScreen = track.source === Track.Source.ScreenShare;
  const tileKey  = isScreen ? `${participant.sid}:screen` : participant.sid;
  if (track.kind === Track.Kind.Video) {
    const tile = tiles.get(tileKey);
    if (tile) {
      const v  = tile.querySelector('video');
      const ph = tile.querySelector('.placeholder');
      track.detach(v);
      v.style.display = 'none';
      if (ph) ph.style.display = 'flex';
      // Remove screen-share tile entirely when unpublished
      if (isScreen) { tile.remove(); tiles.delete(tileKey); }
    }
  } else {
    track.detach().forEach(el => el.remove());
  }
}

// ── Connection ────────────────────────────────────────────────────────────────
async function loadConfig() { return (await fetch('/livekit/config')).json(); }

async function mintToken(identity, name, roomName) {
  const r = await fetch('/livekit/token', {
    method: 'POST',
    headers: { 'content-type': 'application/json' },
    body: JSON.stringify({ identity, name, room: roomName }),
  });
  if (!r.ok) throw new Error(`token mint failed (${r.status}): ${await r.text()}`);
  return r.json();
}

function setStatus(state, text) {
  const s = $('#status'); s.className = state;
  $('#status-text').textContent = text;
}

function showError(msg) {
  const host = $('#banner-host');
  const b    = document.createElement('div');
  b.className = 'banner error';
  b.textContent = msg;
  host.appendChild(b);
}

async function connect() {
  try {
    const cfg = await loadConfig();
    if (!cfg.available) { showError('LiveKit not configured server-side. Run scripts/install-livekit.sh on the server.'); return; }

    const roomName = $('#room').value || cfg.default_room;
    const identity = $('#identity').value || `chef-${Math.random().toString(36).slice(2,7)}`;
    setStatus('connecting', `connecting to ${roomName}…`);

    let rtcConfig = {};
    try {
      const ident = qpIdentity || identity;
      if (ident) {
        const ir = await fetch('/connectivity/ice?peer=' + encodeURIComponent(ident));
        if (ir.ok) { const ic = await ir.json(); rtcConfig = { iceServers: ic.ice_servers || [], iceTransportPolicy: ic.policy || 'all' }; }
      }
    } catch(e) {}

    let livekitUrl, livekitToken;
    if (qpToken) {
      log('using pre-authorized token from call start/answer');
      livekitUrl = cfg.url; livekitToken = qpToken;
    } else {
      log('mint token for', identity, '@', roomName);
      const t = await mintToken(identity, identity, roomName);
      log('token ok, ttl', t.ttl_seconds, 's; connecting', t.url);
      livekitUrl = t.url; livekitToken = t.token;
    }

    room = new Room({ adaptiveStream: true, dynacast: true, rtcConfiguration: rtcConfig });
    room
      .on(RoomEvent.ParticipantConnected,    p              => { log('+', p.identity); makeTile(p); refreshPeers(); })
      .on(RoomEvent.ParticipantDisconnected, p              => { log('-', p.identity); removeTile(p.sid); refreshPeers(); })
      .on(RoomEvent.TrackSubscribed,         (track,_pub,p) => { log('subscribed', track.kind, track.source || '', 'from', p.identity); attachTrack(track, p); })
      .on(RoomEvent.TrackUnsubscribed,       (track,_pub,p) => detachTrack(track, p))
      .on(RoomEvent.LocalTrackPublished,     (pub,p)        => { log('published', pub.kind, pub.source || ''); attachTrack(pub.track, p); })
      .on(RoomEvent.TrackMuted,   (pub,p) => { const m = document.querySelector(`.mic-state[data-sid="${p.sid}"]`); if (m && pub.kind === 'audio') m.textContent = '🔇'; })
      .on(RoomEvent.TrackUnmuted, (pub,p) => { const m = document.querySelector(`.mic-state[data-sid="${p.sid}"]`); if (m && pub.kind === 'audio') m.textContent = '🎤'; })
      .on(RoomEvent.ParticipantMetadataChanged, (_prev,p)   => { updateAgentState(p); })
      .on(RoomEvent.Disconnected,               reason      => { log('disconnected:', reason); cleanup(); })
      .on(RoomEvent.DataReceived,               (payload,participant) => routeDataMessage(payload, participant));

    await room.connect(livekitUrl, livekitToken);
    setStatus('connected', `${identity} in ${roomName}`);
    $('#room-pill').textContent = `room: ${roomName}`;
    log('connected; existing peers:', [...room.remoteParticipants.values()].map(p => p.identity).join(', ') || 'none');

    for (const p of room.remoteParticipants.values()) makeTile(p);
    makeTile(room.localParticipant);
    refreshPeers();

    $('#connect').disabled = true;
    $('#leave').disabled   = false;
    $('#controls').classList.remove('hidden');
    $('#speak-row').classList.remove('hidden');
    startMetadataPolling();

    // D2/D3/D4: reveal panels (collapsed) after connect
    $('#chat-panel').style.display  = 'flex';
    $('#wb-panel').style.display    = 'block';
    $('#watch-panel').style.display = 'flex';

    await toggleMic(true);
    await toggleCam(true);
  } catch (e) {
    log('connect failed:', e.name, e.message);
    showError(`Connect failed: ${e.message}`);
    setStatus('', 'disconnected');
  }
}

function cleanup() {
  for (const sid of [...tiles.keys()]) {
    const t = tiles.get(sid);
    if (t) { t.remove(); tiles.delete(sid); }
  }
  micTrack = null; camTrack = null;
  // Stop any active screen share
  if (screenSharing) stopScreenShare(false);

  $('#connect').disabled = false;
  $('#leave').disabled   = true;
  $('#controls').classList.add('hidden');
  $('#speak-row').classList.add('hidden');
  setMicUI(false); setCamUI(false);
  setStatus('', 'disconnected');

  // D2: reset chat
  $('#chat-panel').style.display = 'none';
  $('#chat-panel').classList.add('collapsed');
  chatOpen = false; chatUnread = 0;
  const chatBadge = $('#chat-unread-badge');
  chatBadge.textContent = ''; chatBadge.classList.remove('show');
  $('#chat-toggle-btn').classList.remove('on'); $('#chat-toggle-btn').classList.add('off');
  $('#chat-chevron').textContent = '▼';

  // D3: reset whiteboard
  $('#wb-panel').style.display = 'none';
  $('#wb-panel').classList.add('collapsed');
  wbOpen = false;
  $('#wb-toggle-btn').classList.remove('on'); $('#wb-toggle-btn').classList.add('off');
  $('#wb-chevron').textContent = '▼';

  // D4: reset watch-together + screen share UI
  $('#watch-panel').style.display = 'none';
  $('#watch-panel').classList.add('collapsed');
  watchOpen = false; watchIsHost = false; watchHostId = null; watchHostTs = 0;
  $('#watch-toggle-btn').classList.remove('on'); $('#watch-toggle-btn').classList.add('off');
  $('#watch-chevron').textContent = '▼';
  setWatchStatus('idle');
  const v = watchEl();
  v.pause(); v.src = ''; v.style.display = 'none';
  watchSetButtons(false);
  $('#watch-placeholder').style.display = '';
  $('#watch-host-label').style.display = 'none';
  $('#watch-time-display').textContent = '';
}

async function speakAsLumina() {
  const text = $('#speak-text').value.trim();
  if (!text || !room) return;
  try {
    const r = await fetch('/livekit/speak', {
      method: 'POST',
      headers: {'content-type': 'application/json'},
      body: JSON.stringify({text, room: room.name, destination: 'lumina'}),
    });
    if (!r.ok) throw new Error(`${r.status}: ${await r.text()}`);
    log('→ lumina says:', text);
    $('#speak-text').value = '';
  } catch (e) {
    log('speak failed:', e.message); showError(`Speak failed: ${e.message}`);
  }
}

async function leave() {
  if (room) { await room.disconnect(); room = null; }
}

function refreshPeers() {
  const n = room ? room.remoteParticipants.size : 0;
  $('#peers-pill').textContent = `${n} peer${n === 1 ? '' : 's'}`;
}

// ── Mic/Cam controls ──────────────────────────────────────────────────────────
function setMicUI(on) {
  const b = $('#mic-toggle');
  b.classList.toggle('on', on); b.classList.toggle('off', !on);
  b.textContent = on ? '🎤 Mic ON' : '🎤 Mic OFF';
}
function setCamUI(on) {
  const b = $('#cam-toggle');
  b.classList.toggle('on', on); b.classList.toggle('off', !on);
  b.textContent = on ? '📷 Cam ON' : '📷 Cam OFF';
}

async function toggleMic(force) {
  if (!room) return;
  const want = force === undefined ? !room.localParticipant.isMicrophoneEnabled : force;
  try {
    const deviceId = $('#mic-select').value || undefined;
    await room.localParticipant.setMicrophoneEnabled(want, { deviceId });
    setMicUI(want); log('mic →', want);
  } catch (e) {
    log('mic toggle failed:', e.name, e.message);
    showError(`Mic blocked: ${e.message}. ${window.isSecureContext ? '' : 'You are on HTTP — see banner.'}`);
  }
}

async function toggleCam(force) {
  if (!room) return;
  const want = force === undefined ? !room.localParticipant.isCameraEnabled : force;
  try {
    const deviceId = $('#cam-select').value || undefined;
    await room.localParticipant.setCameraEnabled(want, { deviceId });
    setCamUI(want); log('cam →', want);
  } catch (e) {
    log('cam toggle failed:', e.name, e.message);
    showError(`Camera blocked: ${e.message}. ${window.isSecureContext ? '' : 'You are on HTTP — see banner.'}`);
  }
}

// ── Event listeners ───────────────────────────────────────────────────────────
$('#connect').addEventListener('click', connect);
$('#leave').addEventListener('click', leave);
$('#mic-toggle').addEventListener('click', () => toggleMic());
$('#cam-toggle').addEventListener('click', () => toggleCam());
$('#mic-select').addEventListener('change', () => { if (room?.localParticipant.isMicrophoneEnabled) toggleMic(true); });
$('#cam-select').addEventListener('change',  () => { if (room?.localParticipant.isCameraEnabled)    toggleCam(true); });
$('#speak-send').addEventListener('click', speakAsLumina);
$('#speak-text').addEventListener('keydown', e => { if (e.key === 'Enter') speakAsLumina(); });

// D2 chat
$('#chat-toggle-btn').addEventListener('click', () => setChatOpen(!chatOpen));
$('#chat-panel-header').addEventListener('click', () => setChatOpen(!chatOpen));
$('#chat-send').addEventListener('click', sendChatMessage);
$('#chat-input').addEventListener('keydown', e => { if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendChatMessage(); } });

// D3 whiteboard
$('#wb-toggle-btn').addEventListener('click', () => setWbOpen(!wbOpen));
$('#wb-panel-header').addEventListener('click', () => setWbOpen(!wbOpen));

// D4a screen share
$('#screen-share-btn').addEventListener('click', toggleScreenShare);

// D4b watch-together
$('#watch-toggle-btn').addEventListener('click', () => {
  setWatchOpen(!watchOpen);
  // Ensure the panel DOM is visible (it's hidden until first connect)
  if (watchOpen && room) $('#watch-panel').style.display = 'flex';
});
$('#watch-panel-header').addEventListener('click', () => setWatchOpen(!watchOpen));
$('#watch-load-btn').addEventListener('click', watchLoadAndShare);
$('#watch-play-btn').addEventListener('click',  watchPlay);
$('#watch-pause-btn').addEventListener('click', watchPause);
$('#watch-sync-btn').addEventListener('click',  watchSync);
$('#watch-url').addEventListener('keydown', e => { if (e.key === 'Enter') watchLoadAndShare(); });

// ── Recording controls ────────────────────────────────────────────────────────
let recordingActive = false;
async function refreshRecordingState() {
  try {
    const r = await fetch('/recordings');
    const d = await r.json();
    recordingActive = !!d.active;
    const btn = $('#record-toggle');
    if (recordingActive) { btn.textContent = '⏹️ Stop'; btn.style.background = '#5a2a2a'; }
    else                 { btn.textContent = '🎙️ Record'; btn.style.background = ''; }
  } catch (e) {}
}
$('#record-toggle').addEventListener('click', async () => {
  try {
    if (!recordingActive) {
      const label = prompt('Recording label (optional, e.g. "cloud9-explanation"):', '') || 'recording';
      const r = await fetch('/livekit/record/start', {
        method: 'POST', headers: {'content-type':'application/json'},
        body: JSON.stringify({label, room: room ? room.name : undefined, target: 'lumina'}),
      });
      if (!r.ok) throw new Error(`start failed (${r.status})`);
      log('recording started');
    } else {
      const r = await fetch('/livekit/record/stop', {method:'POST'});
      const d = await r.json();
      log(`stopped — saved ${d.path} (${d.size_bytes} bytes)`);
    }
  } catch (e) { log('record toggle error:', e.message); }
  await refreshRecordingState();
});
setInterval(refreshRecordingState, 5000);

// ── Init ──────────────────────────────────────────────────────────────────────
(async () => {
  const secure = preflight();
  const cfg    = await loadConfig();
  const qp     = new URLSearchParams(location.search);
  const qpRoom = qp.get('room');
  qpIdentity   = qp.get('identity');
  qpToken      = qp.get('token');
  const path   = location.pathname.replace(/^\/livekit\/?/, '');

  $('#room').value     = qpRoom || path || cfg.default_room;
  const storedIdentity = localStorage.getItem('skchat.identity') || '';
  $('#identity').value = qpIdentity || storedIdentity;
  if (qpIdentity) localStorage.setItem('skchat.identity', qpIdentity);
  $('#identity').addEventListener('change', e => localStorage.setItem('skchat.identity', e.target.value));

  if (!cfg.available) { setStatus('', 'server: livekit not configured'); $('#connect').disabled = true; return; }
  setStatus('', secure ? 'ready' : 'ready (no media — insecure context)');
  if (secure) await enumerateDevices();

  // Probe screen-share support and hide the button if unsupported
  if (!navigator.mediaDevices?.getDisplayMedia) {
    const btn = $('#screen-share-btn');
    btn.disabled = true;
    btn.title = 'Screen share requires a secure context + supported browser';
    const msg = $('#screen-unsupported-msg');
    msg.style.display = 'inline';
  }

  // Wire up watch-together video element listeners
  setupWatchVideoListeners();

  if (qpRoom && qpIdentity) await connect();
})();
</script>
