<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>SKChat Voice</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

/* ── 2027 Design System tokens ──────────────────────────────────────────────
   Flat-with-depth (NEVER glass/blur). One teal accent. Blue = self only.
   Near-black #0b0d10 canvas. Inter + JetBrains Mono.
   Motion: rise 220ms / expand 180ms / pulse 1s.
   ──────────────────────────────────────────────────────────────────────── */
:root {
  color-scheme: dark;
  /* Canvas + surface layers */
  --canvas:      #0b0d10;
  --surface-1:   #111318;
  --surface-2:   #16191f;
  --surface-3:   #1d2029;
  /* Borders (hairline) */
  --border-sub:  #1c1f26;
  --border-mid:  #252a35;
  --border-hi:   #343a4a;
  /* Accent: ONE teal */
  --accent:      #2dd4bf;
  --accent-dim:  #14b8a6;
  --accent-mute: #0d7a6e22;
  /* Blue = self / local only */
  --self-blue:   #3b82f6;
  --self-bubble: #142140;
  /* Semantic */
  --good:   #34d399;
  --bad:    #f87171;
  --warn:   #fbbf24;
  /* Typography */
  --font-sans: 'Inter', ui-sans-serif, system-ui, sans-serif;
  --font-mono: 'JetBrains Mono', ui-monospace, monospace;
  /* Elevation (flat-with-depth — soft shadow, no blur) */
  --shadow-card:  0 2px 8px rgba(0,0,0,.45), 0 0 0 1px var(--border-sub);
  --shadow-panel: 0 4px 16px rgba(0,0,0,.5),  0 0 0 1px var(--border-mid);
  /* Motion */
  --t-rise:   220ms;
  --t-expand: 180ms;
  --t-pulse:  1s;
  /* Radius */
  --r-sm:  8px;
  --r-md:  11px;
  --r-lg:  13px;
  --r-xl:  14px;

  /* --- Legacy aliases (used by JS soul-color runtime; structural CSS uses tokens above) --- */
  --bg: var(--canvas);
  --surface-raised: var(--surface-1);
  --text-primary: #d4d9e8;
  --text-secondary: #6b7280;
  --text-tertiary: #4b5263;
  --accent-encrypt: var(--good);
  --accent-danger: var(--bad);
  --soul-color: var(--accent);            /* default; JS overrides per agent */
  --soul-color-18: #0d7a6e22;
  --soul-color-30: #0d7a6e48;
  --font-primary: var(--font-sans);
}

html, body {
  height: 100%;
  overflow: hidden;
}

body {
  background: var(--canvas);
  color: var(--text-primary);
  font-family: var(--font-sans);
  display: flex;
  flex-direction: column;
  height: 100dvh;
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
  /* NO backdrop-filter anywhere — flat-with-depth discipline */
}

/* ─── Header ─── */
.app-header {
  padding: 12px 16px;
  display: flex;
  align-items: center;
  gap: 10px;
  background: var(--surface-1);
  border-bottom: 1px solid var(--border-sub);
  flex-shrink: 0;
  z-index: 10;
  box-shadow: 0 1px 0 var(--border-sub), 0 2px 8px rgba(0,0,0,.35);
}

.agent-avatar-header {
  width: 32px;
  height: 32px;
  border-radius: 50%;
  background: var(--soul-color);
  display: flex;
  align-items: center;
  justify-content: center;
  font-weight: 700;
  font-size: 14px;
  color: #000;
  flex-shrink: 0;
}

.header-info {
  flex: 1;
  min-width: 0;
}

.agent-name {
  font-size: 16px;
  font-weight: 600;
  color: var(--text-primary);
  display: flex;
  align-items: center;
  gap: 6px;
}

.soul-dot {
  width: 8px;
  height: 8px;
  border-radius: 50%;
  background: var(--soul-color);
  flex-shrink: 0;
}

.header-subtitle {
  font-size: 12px;
  color: var(--text-secondary);
  margin-top: 1px;
}

#status-badge {
  font-size: 11px;
  font-weight: 500;
  padding: 3px 10px;
  border-radius: var(--r-lg);
  background: var(--surface-2);
  border: 1px solid var(--border-mid);
  color: var(--text-tertiary);
  transition: border-color var(--t-expand) ease, color var(--t-expand) ease;
  white-space: nowrap;
}

#status-badge.connected  { border-color: var(--good);   color: var(--good); }
#status-badge.listening  { border-color: var(--warn);   color: var(--warn);   animation: pulse var(--t-pulse) infinite; }
#status-badge.processing { border-color: var(--accent); color: var(--accent); }
#status-badge.thinking   { border-color: var(--accent); color: var(--accent); animation: pulse calc(var(--t-pulse) * 1.5) infinite; }
#status-badge.speaking   { border-color: var(--accent); color: var(--accent); animation: pulse calc(var(--t-pulse) * 0.8) infinite; }
#status-badge.error      { border-color: var(--bad);    color: var(--bad); }

.header-actions {
  display: flex;
  gap: 6px;
  flex-shrink: 0;
}

.btn-icon {
  width: 36px;
  height: 36px;
  border-radius: var(--r-sm);
  border: 1px solid var(--border-mid);
  background: var(--surface-2);
  color: var(--text-secondary);
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: border-color var(--t-expand) ease, background var(--t-expand) ease;
  font-size: 16px;
}

.btn-icon:hover {
  border-color: var(--border-hi);
  color: var(--text-primary);
}

.btn-icon.voice-active {
  background: rgba(248,113,113,0.12);
  border-color: var(--bad);
  color: var(--bad);
  animation: pulse-ring calc(var(--t-pulse) * 1.5) infinite;
}

@keyframes pulse {
  0%, 100% { opacity: 1; }
  50% { opacity: 0.5; }
}

@keyframes pulse-ring {
  0% { box-shadow: 0 0 0 0 rgba(239,68,68,0.3); }
  70% { box-shadow: 0 0 0 8px rgba(239,68,68,0); }
  100% { box-shadow: 0 0 0 0 rgba(239,68,68,0); }
}

/* ─── Voice Visualizer Bar ─── */
#voice-visualizer {
  height: 0;
  overflow: hidden;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 2px;
  background: var(--surface-1);
  border-bottom: 1px solid var(--border-sub);
  transition: height var(--t-expand) ease;
  flex-shrink: 0;
}

#voice-visualizer.active {
  height: 40px;
  padding: 4px 16px;
}

.viz-bar {
  width: 3px;
  background: var(--accent);
  border-radius: 2px;
  transition: height 0.05s ease;
  height: 4px;
  opacity: 0.7;
}

/* ─── Chat Area ─── */
#chat-area {
  flex: 1;
  overflow-y: auto;
  overflow-x: hidden;
  padding: 16px;
  display: flex;
  flex-direction: column;
  gap: 8px;
  scroll-behavior: smooth;
  overscroll-behavior: contain;
}

#chat-area::-webkit-scrollbar {
  width: 4px;
}

#chat-area::-webkit-scrollbar-track {
  background: transparent;
}

#chat-area::-webkit-scrollbar-thumb {
  background: var(--border-mid);
  border-radius: 2px;
}

/* ─── Messages ─── */
.message-row {
  display: flex;
  gap: 8px;
  max-width: 85%;
  animation: msg-in 0.25s ease-out;
}

.message-row.user {
  align-self: flex-end;
  flex-direction: row-reverse;
}

.message-row.assistant {
  align-self: flex-start;
}

@keyframes msg-in {
  from { opacity: 0; transform: translateY(8px); }
  to { opacity: 1; transform: translateY(0); }
}

.msg-avatar {
  width: 28px;
  height: 28px;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-weight: 600;
  font-size: 12px;
  flex-shrink: 0;
  align-self: flex-end;
  margin-bottom: 2px;
}

.msg-avatar.agent {
  background: var(--soul-color);
  color: #000;
}

.msg-avatar.user {
  background: #FFC107;
  color: #000;
}

.msg-bubble {
  padding: 8px 12px;
  font-size: 14px;
  line-height: 1.5;
  word-wrap: break-word;
  overflow-wrap: break-word;
}

.msg-bubble.user {
  background: var(--self-bubble);
  border: 1px solid color-mix(in srgb, var(--self-blue) 30%, transparent);
  border-radius: 16px 16px 4px 16px;
  color: var(--text-primary);
}

.msg-bubble.assistant {
  background: var(--surface-1);
  border: 1px solid var(--border-sub);
  border-left: 3px solid var(--soul-color);
  border-radius: 16px 16px 16px 4px;
  color: var(--text-primary);
}

.msg-meta {
  display: flex;
  align-items: center;
  gap: 6px;
  margin-top: 4px;
}

.msg-time {
  font-size: 10px;
  color: var(--text-tertiary);
  font-family: var(--font-mono);
}

.msg-via {
  font-size: 10px;
  color: var(--text-tertiary);
  font-style: italic;
}

/* Status indicator in chat */
.status-indicator {
  align-self: flex-start;
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 6px 12px;
  font-size: 12px;
  color: var(--text-secondary);
  animation: msg-in 0.25s ease-out;
}

.status-indicator .typing-dots {
  display: flex;
  gap: 3px;
}

.status-indicator .typing-dots span {
  width: 5px;
  height: 5px;
  border-radius: 50%;
  background: var(--soul-color);
  animation: typing-bounce 1.2s infinite;
}

.status-indicator .typing-dots span:nth-child(2) { animation-delay: 0.2s; }
.status-indicator .typing-dots span:nth-child(3) { animation-delay: 0.4s; }

@keyframes typing-bounce {
  0%, 60%, 100% { transform: translateY(0); opacity: 0.4; }
  30% { transform: translateY(-4px); opacity: 1; }
}

/* ─── Input Area ─── */
.input-area {
  padding: 8px 12px;
  padding-bottom: max(8px, env(safe-area-inset-bottom));
  background: var(--surface-1);
  border-top: 1px solid var(--border-sub);
  display: flex;
  align-items: flex-end;
  gap: 8px;
  flex-shrink: 0;
  z-index: 10;
  /* NO backdrop-filter — flat-with-depth */
}

.input-wrapper {
  flex: 1;
  display: flex;
  align-items: flex-end;
  background: var(--surface-2);
  border: 1px solid var(--border-mid);
  border-radius: var(--r-xl);
  padding: 4px 4px 4px 14px;
  transition: border-color var(--t-expand) ease;
  min-height: 40px;
}

.input-wrapper:focus-within {
  border-color: var(--accent);
}

#text-input {
  flex: 1;
  background: none;
  border: none;
  outline: none;
  color: var(--text-primary);
  font-family: var(--font-primary);
  font-size: 14px;
  line-height: 1.4;
  resize: none;
  max-height: 120px;
  padding: 6px 0;
}

#text-input::placeholder {
  color: var(--text-tertiary);
}

.btn-send {
  width: 32px;
  height: 32px;
  border-radius: 50%;
  border: none;
  background: var(--accent-dim);
  color: #0b0d10;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
  transition: background var(--t-expand) ease;
  font-size: 14px;
  font-weight: 600;
}

.btn-send:hover:not(:disabled) {
  background: var(--accent);
}

.btn-send:disabled {
  background: var(--border-mid);
  cursor: default;
}

.btn-voice-input {
  width: 40px;
  height: 40px;
  border-radius: 50%;
  border: 2px solid var(--border-mid);
  background: var(--surface-2);
  color: var(--text-secondary);
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
  transition: border-color var(--t-expand) ease, color var(--t-expand) ease;
  font-size: 18px;
}

.btn-voice-input:hover {
  border-color: var(--accent);
  color: var(--accent);
}

.btn-voice-input.active {
  border-color: var(--bad);
  color: var(--bad);
  background: rgba(248,113,113,0.10);
  animation: pulse-ring calc(var(--t-pulse) * 1.5) infinite;
}

/* ─── Empty State ─── */
.empty-state {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 12px;
  color: var(--text-tertiary);
  padding: 32px;
  text-align: center;
}

.empty-state .agent-icon {
  width: 56px;
  height: 56px;
  border-radius: 50%;
  background: var(--soul-color);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 24px;
  font-weight: 700;
  color: #000;
  margin-bottom: 4px;
}

.empty-state h2 {
  font-size: 18px;
  font-weight: 600;
  color: var(--text-secondary);
}

.empty-state p {
  font-size: 13px;
  line-height: 1.5;
  max-width: 280px;
}

/* ─── Agent Picker Panel ─── */
.agent-panel-overlay {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.6);
  z-index: 100;
  opacity: 0;
  visibility: hidden;
  transition: opacity var(--t-expand) ease, visibility var(--t-expand) ease;
}

.agent-panel-overlay.open {
  opacity: 1;
  visibility: visible;
}

.agent-panel {
  position: fixed;
  top: 0;
  left: 0;
  bottom: 0;
  width: 280px;
  max-width: 85vw;
  background: var(--surface-1);
  border-right: 1px solid var(--border-mid);
  box-shadow: var(--shadow-panel);
  z-index: 101;
  transform: translateX(-100%);
  transition: transform var(--t-rise) cubic-bezier(0.4, 0, 0.2, 1);
  display: flex;
  flex-direction: column;
  overflow: hidden;
  /* NO backdrop-filter — flat-with-depth */
}

.agent-panel.open {
  transform: translateX(0);
}

.agent-panel-header {
  padding: 16px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  border-bottom: 1px solid var(--border-sub);
  flex-shrink: 0;
}

.agent-panel-header h3 {
  font-size: 15px;
  font-weight: 600;
  color: var(--text-primary);
}

.agent-panel-close {
  width: 32px;
  height: 32px;
  border-radius: var(--r-sm);
  border: 1px solid var(--border-mid);
  background: var(--surface-2);
  color: var(--text-secondary);
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 18px;
  transition: border-color var(--t-expand) ease;
}

.agent-panel-close:hover {
  border-color: var(--border-hi);
  color: var(--text-primary);
}

.agent-panel-list {
  flex: 1;
  overflow-y: auto;
  padding: 8px;
}

.agent-panel-item {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 10px 12px;
  border-radius: var(--r-md);
  cursor: pointer;
  transition: background var(--t-expand) ease;
  text-decoration: none;
  color: inherit;
}

.agent-panel-item:hover {
  background: var(--surface-2);
}

.agent-panel-item.active {
  background: var(--surface-3);
}

.agent-panel-avatar {
  width: 36px;
  height: 36px;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-weight: 700;
  font-size: 15px;
  color: #0b0d10;
  flex-shrink: 0;
}

.agent-panel-avatar.group-icon {
  background: linear-gradient(135deg, var(--accent) 0%, var(--good) 100%);
  font-size: 16px;
}

.agent-panel-name {
  flex: 1;
  font-size: 14px;
  font-weight: 500;
  color: var(--text-primary);
}

.agent-panel-badge {
  font-size: 10px;
  font-weight: 600;
  padding: 2px 8px;
  border-radius: var(--r-sm);
  background: var(--accent-mute);
  color: var(--accent);
  border: 1px solid color-mix(in srgb, var(--accent) 30%, transparent);
  text-transform: uppercase;
  letter-spacing: 0.5px;
}

/* ─── Responsive ─── */
/* Phone-first overrides — keep everything visible at <=480px */
@media (max-width: 480px) {
  .app-header {
    padding: 10px 12px;
    gap: 8px;
  }
  .agent-avatar-header { width: 30px; height: 30px; font-size: 13px; }
  .agent-name { font-size: 14px; gap: 4px; }
  .header-subtitle { display: none; }
  .soul-dot { width: 6px; height: 6px; }
  /* Collapse status text into a colored dot */
  #status-badge {
    font-size: 0;
    padding: 0;
    width: 10px;
    height: 10px;
    border-radius: 50%;
    background: var(--surface-2);
    border: 1px solid var(--border-mid);
    flex-shrink: 0;
  }
  #status-badge.connected  { background: var(--good);   border-color: var(--good); }
  #status-badge.listening  { background: var(--warn);   border-color: var(--warn); }
  #status-badge.thinking,
  #status-badge.speaking,
  #status-badge.processing { background: var(--accent); border-color: var(--accent); }
  #status-badge.error      { background: var(--bad);    border-color: var(--bad); }
  .header-actions { gap: 6px; }
  .btn-icon { width: 34px; height: 34px; }
  .input-area {
    padding: 6px 8px;
    gap: 6px;
    padding-bottom: max(6px, env(safe-area-inset-bottom));
  }
  .input-wrapper {
    padding: 4px 4px 4px 12px;
    min-height: 38px;
  }
  #text-input { font-size: 15px; padding: 5px 0; }
  .btn-send { width: 30px; height: 30px; }
  .btn-voice-input { width: 40px; height: 40px; }
  .empty-state { padding: 20px; }
  .empty-state h2 { font-size: 17px; }
  .empty-state p { font-size: 13px; }
}

@media (min-width: 640px) {
  #chat-area { padding: 20px 32px; }
  .message-row { max-width: 70%; }
  .input-area { padding: 12px 24px; }
}

@media (min-width: 1024px) {
  body {
    max-width: 800px;
    margin: 0 auto;
    border-left: 1px solid var(--border-sub);
    border-right: 1px solid var(--border-sub);
  }
}
</style>
</head>
<body>

<!-- Agent Picker Panel -->
<div class="agent-panel-overlay" id="agent-panel-overlay" onclick="closeAgentPanel()"></div>
<div class="agent-panel" id="agent-panel">
  <div class="agent-panel-header">
    <h3>Agents</h3>
    <button class="agent-panel-close" onclick="closeAgentPanel()">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
    </button>
  </div>
  <div class="agent-panel-list" id="agent-panel-list"></div>
</div>

<!-- Header -->
<header class="app-header">
  <div class="agent-avatar-header" id="header-avatar">L</div>
  <div class="header-info">
    <div class="agent-name">
      <span id="agent-name-text">Lumina</span>
      <span class="soul-dot" id="soul-dot"></span>
    </div>
    <div class="header-subtitle" id="header-subtitle">Voice + Text Chat</div>
  </div>
  <span id="status-badge">connecting</span>
  <div class="header-actions">
    <button class="btn-icon" id="btn-agents" title="Switch agent" onclick="openAgentPanel()">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
    </button>
    <button class="btn-icon" id="btn-clear" title="Clear conversation" onclick="clearHistory()">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg>
    </button>
    <button class="btn-icon" id="btn-voice-toggle" title="Toggle voice mode" onclick="toggleVoice()">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/><path d="M19 10v2a7 7 0 0 1-14 0v-2"/><line x1="12" y1="19" x2="12" y2="23"/><line x1="8" y1="23" x2="16" y2="23"/></svg>
    </button>
  </div>
</header>

<!-- Voice Visualizer -->
<div id="voice-visualizer"></div>

<!-- Chat Area -->
<div id="chat-area">
  <div class="empty-state" id="empty-state">
    <div class="agent-icon" id="empty-avatar">L</div>
    <h2 id="empty-greeting">Chat with Lumina</h2>
    <p>Type a message or tap the microphone to start a voice conversation.</p>
  </div>
</div>

<!-- Status Indicator (typing/thinking) -->
<div class="status-indicator" id="status-indicator" style="display:none;">
  <div class="typing-dots"><span></span><span></span><span></span></div>
  <span id="status-label">Thinking...</span>
</div>

<!-- Input Area -->
<div class="input-area">
  <div class="input-wrapper">
    <textarea id="text-input" rows="1" placeholder="Message..." autocomplete="off"></textarea>
    <button class="btn-send" id="btn-send" onclick="sendTextMessage()" disabled title="Send message">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
    </button>
  </div>
  <button class="btn-voice-input" id="btn-voice-bottom" onclick="toggleVoice()" title="Hold to talk">
    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/><path d="M19 10v2a7 7 0 0 1-14 0v-2"/><line x1="12" y1="19" x2="12" y2="23"/><line x1="8" y1="23" x2="16" y2="23"/></svg>
  </button>
</div>

<script>
(function() {
  'use strict';

  // ─── Agent & Soul Colors ───
  const SOUL_COLORS = {
    lumina:    '#BB86FC',
    jarvis:    '#00E5FF',
    chef:      '#FFC107',
    opus:      '#10B981',
    artisan:   '#808098',
    coder:     '#808098',
    architect: '#808098',
    scholar:   '#808098',
    herald:    '#808098',
    sentinel:  '#808098',
    steward:   '#808098',
  };

  const KNOWN_AGENTS = [
    { name: 'lumina',    color: '#BB86FC' },
    { name: 'jarvis',    color: '#00E5FF' },
    { name: 'opus',      color: '#10B981' },
    { name: 'artisan',   color: '#808098' },
    { name: 'coder',     color: '#808098' },
    { name: 'architect', color: '#808098' },
    { name: 'scholar',   color: '#808098' },
    { name: 'herald',    color: '#808098' },
    { name: 'sentinel',  color: '#808098' },
    { name: 'steward',   color: '#808098' },
  ];

  // Extract agent from URL path: /voice/{agent_name}
  const pathParts = location.pathname.split('/');
  const agentName = (pathParts.length >= 3 && pathParts[1] === 'voice' && pathParts[2])
    ? pathParts[2].toLowerCase()
    : 'lumina';

  const agentDisplayName = agentName.charAt(0).toUpperCase() + agentName.slice(1);
  const soulColor = SOUL_COLORS[agentName] || '#BB86FC';
  const agentInitial = agentDisplayName.charAt(0);

  // Apply soul color to CSS custom properties
  const root = document.documentElement;
  root.style.setProperty('--soul-color', soulColor);

  // Parse soul color for alpha variants
  function hexToRgb(hex) {
    const r = parseInt(hex.slice(1,3), 16);
    const g = parseInt(hex.slice(3,5), 16);
    const b = parseInt(hex.slice(5,7), 16);
    return `${r},${g},${b}`;
  }
  const soulRgb = hexToRgb(soulColor);
  root.style.setProperty('--soul-color-18', `rgba(${soulRgb},0.18)`);
  root.style.setProperty('--soul-color-30', `rgba(${soulRgb},0.30)`);

  // Set agent info in header
  document.getElementById('agent-name-text').textContent = agentDisplayName;
  document.getElementById('header-avatar').textContent = agentInitial;
  document.getElementById('empty-avatar').textContent = agentInitial;
  document.getElementById('empty-greeting').textContent = 'Chat with ' + agentDisplayName;
  document.title = agentDisplayName + ' \u2014 SKChat';

  // ─── Agent Panel ───
  function buildAgentPanel() {
    const list = document.getElementById('agent-panel-list');
    list.innerHTML = '';

    // Group Chat item at top
    const groupItem = document.createElement('a');
    groupItem.className = 'agent-panel-item';
    groupItem.href = '/voice-group';
    groupItem.innerHTML =
      '<div class="agent-panel-avatar group-icon">G</div>' +
      '<span class="agent-panel-name">Group Chat</span>';
    list.appendChild(groupItem);

    // Divider
    const divider = document.createElement('div');
    divider.style.cssText = 'height:1px;background:var(--border-sub);margin:4px 12px;';
    list.appendChild(divider);

    // Agent items
    KNOWN_AGENTS.forEach(function(agent) {
      const item = document.createElement('a');
      item.className = 'agent-panel-item' + (agent.name === agentName ? ' active' : '');
      item.href = '/voice/' + agent.name;

      const displayName = agent.name.charAt(0).toUpperCase() + agent.name.slice(1);
      const initial = displayName.charAt(0);

      let badgeHtml = '';
      if (agent.name === agentName) {
        badgeHtml = '<span class="agent-panel-badge">Active</span>';
      }

      item.innerHTML =
        '<div class="agent-panel-avatar" style="background:' + agent.color + ';">' + initial + '</div>' +
        '<span class="agent-panel-name">' + displayName + '</span>' +
        badgeHtml;

      list.appendChild(item);
    });
  }

  buildAgentPanel();

  window.openAgentPanel = function() {
    document.getElementById('agent-panel').classList.add('open');
    document.getElementById('agent-panel-overlay').classList.add('open');
  };

  window.closeAgentPanel = function() {
    document.getElementById('agent-panel').classList.remove('open');
    document.getElementById('agent-panel-overlay').classList.remove('open');
  };

  // ─── State ───
  let ws = null;
  let audioCtx = null;
  let mediaStream = null;
  let scriptProcessor = null;
  let isVoiceActive = false;
  let messageCount = 0;

  // Audio playback queue
  let playbackQueue = [];
  let isPlaying = false;

  const SAMPLE_RATE = 16000;

  // ─── DOM Refs ───
  const statusBadge     = document.getElementById('status-badge');
  const chatArea        = document.getElementById('chat-area');
  const emptyState      = document.getElementById('empty-state');
  const textInput       = document.getElementById('text-input');
  const btnSend         = document.getElementById('btn-send');
  const btnVoiceToggle  = document.getElementById('btn-voice-toggle');
  const btnVoiceBottom  = document.getElementById('btn-voice-bottom');
  const visualizer      = document.getElementById('voice-visualizer');
  const statusIndicator = document.getElementById('status-indicator');
  const statusLabel     = document.getElementById('status-label');

  // Create visualizer bars
  for (let i = 0; i < 32; i++) {
    const bar = document.createElement('div');
    bar.className = 'viz-bar';
    visualizer.appendChild(bar);
  }
  const vizBars = visualizer.querySelectorAll('.viz-bar');

  // ─── Text Input Auto-resize ───
  textInput.addEventListener('input', function() {
    this.style.height = 'auto';
    this.style.height = Math.min(this.scrollHeight, 120) + 'px';
    btnSend.disabled = !this.value.trim();
  });

  textInput.addEventListener('keydown', function(e) {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      if (this.value.trim()) sendTextMessage();
    }
  });

  // ─── WebSocket ───
  function connectWS() {
    const proto = location.protocol === 'https:' ? 'wss:' : 'ws:';
    const wsPath = agentName ? '/ws/voice/' + agentName : '/ws/voice';
    ws = new WebSocket(proto + '//' + location.host + wsPath);
    ws.binaryType = 'arraybuffer';

    ws.onopen = function() {
      setStatus('connected', 'Connected');
    };

    ws.onmessage = function(evt) {
      if (evt.data instanceof ArrayBuffer) {
        playbackQueue.push(evt.data);
        if (!isPlaying) drainPlaybackQueue();
      } else {
        try {
          const msg = JSON.parse(evt.data);
          handleServerMessage(msg);
        } catch(e) {
          // non-JSON text message, ignore
        }
      }
    };

    ws.onclose = function() {
      setStatus('disconnected', 'Reconnecting...');
      setTimeout(connectWS, 3000);
    };

    ws.onerror = function() {
      setStatus('error', 'Connection error');
    };
  }

  function handleServerMessage(msg) {
    if (msg.type === 'status') {
      const state = msg.status || msg.state || '';
      const message = msg.message || state;
      setStatus(state, message);

      if (state === 'thinking' || state === 'processing') {
        showStatusIndicator(state === 'thinking' ? 'Thinking...' : 'Processing...');
      } else if (state === 'speaking') {
        showStatusIndicator('Speaking...');
      } else {
        hideStatusIndicator();
      }
    } else if (msg.type === 'transcript') {
      hideStatusIndicator();
      addMessage(msg.role, msg.text, msg.via);
    } else if (msg.type === 'error') {
      hideStatusIndicator();
      addMessage('system', msg.message || 'An error occurred');
    } else if (msg.type === 'audio_end') {
      // Audio stream ended, queue drains naturally
    } else if (msg.type === 'pong') {
      // Heartbeat
    }
  }

  // ─── Audio Capture ───
  async function startCapture() {
    try {
      audioCtx = new (window.AudioContext || window.webkitAudioContext)({ sampleRate: SAMPLE_RATE });

      mediaStream = await navigator.mediaDevices.getUserMedia({
        audio: {
          sampleRate: SAMPLE_RATE,
          channelCount: 1,
          echoCancellation: true,
          noiseSuppression: true,
          autoGainControl: true,
        }
      });

      const source = audioCtx.createMediaStreamSource(mediaStream);
      scriptProcessor = audioCtx.createScriptProcessor(512, 1, 1);

      // Client-side VAD
      let isSpeaking = false;
      let silenceFrames = 0;
      let speechFrames = 0;
      const SILENCE_THRESHOLD = 0.01;
      const SILENCE_FRAMES_NEEDED = 30; // ~0.96s at 512/16kHz
      const SPEECH_FRAMES_NEEDED = 3;

      scriptProcessor.onaudioprocess = function(e) {
        if (!isVoiceActive || !ws || ws.readyState !== WebSocket.OPEN) return;

        const inputData = e.inputBuffer.getChannelData(0);

        // RMS energy
        let sum = 0;
        for (let i = 0; i < inputData.length; i++) sum += inputData[i] * inputData[i];
        const rms = Math.sqrt(sum / inputData.length);

        // Float32 to Int16 PCM
        const pcm = new Int16Array(inputData.length);
        for (let i = 0; i < inputData.length; i++) {
          const s = Math.max(-1, Math.min(1, inputData[i]));
          pcm[i] = s < 0 ? s * 0x8000 : s * 0x7FFF;
        }

        if (rms > SILENCE_THRESHOLD) {
          speechFrames++;
          silenceFrames = 0;
          if (!isSpeaking && speechFrames >= SPEECH_FRAMES_NEEDED) {
            isSpeaking = true;
          }
        } else {
          speechFrames = 0;
          if (isSpeaking) {
            silenceFrames++;
            if (silenceFrames >= SILENCE_FRAMES_NEEDED) {
              isSpeaking = false;
              silenceFrames = 0;
              ws.send('END_OF_SPEECH');
            }
          }
        }

        if (isSpeaking || silenceFrames < SILENCE_FRAMES_NEEDED) {
          ws.send(pcm.buffer);
        }

        updateVisualizer(inputData);
      };

      source.connect(scriptProcessor);
      scriptProcessor.connect(audioCtx.destination);
    } catch (err) {
      setStatus('error', 'Mic denied: ' + err.message);
      isVoiceActive = false;
      updateVoiceUI();
    }
  }

  function stopCapture() {
    if (scriptProcessor) { scriptProcessor.disconnect(); scriptProcessor = null; }
    if (mediaStream) { mediaStream.getTracks().forEach(t => t.stop()); mediaStream = null; }
    if (audioCtx) { audioCtx.close(); audioCtx = null; }
    vizBars.forEach(b => b.style.height = '4px');
  }

  // ─── Audio Playback ───
  function drainPlaybackQueue() {
    if (playbackQueue.length === 0) {
      isPlaying = false;
      return;
    }
    isPlaying = true;

    const chunks = [];
    while (playbackQueue.length > 0) chunks.push(playbackQueue.shift());

    const blob = new Blob(chunks, { type: 'audio/wav' });
    const url = URL.createObjectURL(blob);
    const audio = new Audio(url);
    audio.onended = function() {
      URL.revokeObjectURL(url);
      if (playbackQueue.length > 0) {
        drainPlaybackQueue();
      } else {
        isPlaying = false;
      }
    };
    audio.play().catch(function(e) {
      console.error('Playback failed:', e);
      isPlaying = false;
    });
  }

  // ─── Visualizer ───
  function updateVisualizer(samples) {
    const step = Math.floor(samples.length / vizBars.length);
    for (let i = 0; i < vizBars.length; i++) {
      let sum = 0;
      for (let j = 0; j < step; j++) {
        sum += Math.abs(samples[i * step + j] || 0);
      }
      const avg = sum / step;
      const height = Math.max(4, Math.min(32, avg * 400));
      vizBars[i].style.height = height + 'px';
    }
  }

  // ─── UI Helpers ───
  function setStatus(status, message) {
    statusBadge.textContent = message || status;
    statusBadge.className = status;
  }

  function showStatusIndicator(text) {
    statusLabel.textContent = text;
    statusIndicator.style.display = 'flex';
    scrollToBottom();
  }

  function hideStatusIndicator() {
    statusIndicator.style.display = 'none';
  }

  function updateVoiceUI() {
    if (isVoiceActive) {
      btnVoiceToggle.classList.add('voice-active');
      btnVoiceBottom.classList.add('active');
      visualizer.classList.add('active');
    } else {
      btnVoiceToggle.classList.remove('voice-active');
      btnVoiceBottom.classList.remove('active');
      visualizer.classList.remove('active');
    }
  }

  function formatTime(date) {
    return date.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
  }

  function escapeHtml(str) {
    const div = document.createElement('div');
    div.textContent = str;
    return div.innerHTML;
  }

  function scrollToBottom() {
    requestAnimationFrame(function() {
      chatArea.scrollTop = chatArea.scrollHeight;
    });
  }

  // ─── Session Cache (localStorage) ───
  const SESSION_KEY = 'skvoice_session_' + agentName;
  const SESSION_EMOTION_KEY = 'skvoice_emotion_' + agentName;
  let sessionMessages = []; // {role, content, timestamp}

  function saveSession() {
    try {
      localStorage.setItem(SESSION_KEY, JSON.stringify(sessionMessages.slice(-50)));
    } catch(e) {}
  }

  function loadCachedSession() {
    try {
      const raw = localStorage.getItem(SESSION_KEY);
      if (raw) return JSON.parse(raw);
    } catch(e) {}
    return null;
  }

  function clearCachedSession() {
    try {
      localStorage.removeItem(SESSION_KEY);
      localStorage.removeItem(SESSION_EMOTION_KEY);
    } catch(e) {}
    sessionMessages = [];
  }

  function injectSession(cached) {
    // Restore messages to chat UI
    cached.forEach(function(msg) {
      addMessage(msg.role, msg.content, null, true);
    });
    // Send to server so LLM has context
    if (ws && ws.readyState === WebSocket.OPEN) {
      ws.send(JSON.stringify({
        type: 'inject_session',
        messages: cached.map(function(m) { return { role: m.role, content: m.content }; }),
        emotion_state: localStorage.getItem(SESSION_EMOTION_KEY) || '',
      }));
    }
  }

  function showResumePrompt(cached) {
    if (emptyState) emptyState.remove();

    const prompt = document.createElement('div');
    prompt.className = 'empty-state';
    prompt.id = 'resume-prompt';
    const lastMsg = cached[cached.length - 1];
    const preview = lastMsg ? lastMsg.content.slice(0, 80) + (lastMsg.content.length > 80 ? '...' : '') : '';
    const timeStr = lastMsg && lastMsg.timestamp ? new Date(lastMsg.timestamp).toLocaleString() : '';
    prompt.innerHTML =
      '<div class="agent-icon">' + agentInitial + '</div>' +
      '<h2>Welcome back</h2>' +
      '<p style="color:var(--text-secondary);margin-bottom:4px;">' + cached.length + ' messages from previous session' + (timeStr ? '<br><span style="font-size:11px;color:var(--text-tertiary);">' + timeStr + '</span>' : '') + '</p>' +
      '<p style="color:var(--text-tertiary);font-style:italic;margin-bottom:12px;">"' + escapeHtml(preview) + '"</p>' +
      '<div style="display:flex;gap:8px;">' +
        '<button onclick="resumeSession()" style="padding:8px 20px;border-radius:var(--r-md);border:1px solid var(--accent);background:var(--accent-mute);color:var(--accent);font-family:var(--font-sans);font-size:13px;font-weight:600;cursor:pointer;">Resume</button>' +
        '<button onclick="newSession()" style="padding:8px 20px;border-radius:var(--r-md);border:1px solid var(--border-mid);background:var(--surface-2);color:var(--text-secondary);font-family:var(--font-sans);font-size:13px;cursor:pointer;">New Session</button>' +
      '</div>';
    chatArea.appendChild(prompt);
  }

  window.resumeSession = function() {
    const el = document.getElementById('resume-prompt');
    if (el) el.remove();
    const cached = loadCachedSession();
    if (cached && cached.length > 0) {
      sessionMessages = cached;
      injectSession(cached);
    }
  };

  window.newSession = function() {
    const el = document.getElementById('resume-prompt');
    if (el) el.remove();
    clearCachedSession();
    // Show empty state
    const es = document.createElement('div');
    es.className = 'empty-state';
    es.id = 'empty-state';
    es.innerHTML =
      '<div class="agent-icon">' + agentInitial + '</div>' +
      '<h2>Chat with ' + agentDisplayName + '</h2>' +
      '<p>Type a message or tap the microphone to start a voice conversation.</p>';
    chatArea.appendChild(es);
    if (ws && ws.readyState === WebSocket.OPEN) {
      ws.send('CLEAR_HISTORY');
    }
  };

  function addMessage(role, text, via, isReplay) {
    // Hide empty state on first message
    var es = document.getElementById('empty-state') || document.getElementById('resume-prompt');
    if (es) es.remove();
    messageCount++;

    // Cache to session (unless replaying)
    if (!isReplay && (role === 'user' || role === 'assistant')) {
      sessionMessages.push({ role: role, content: text, timestamp: Date.now() });
      saveSession();
    }

    const row = document.createElement('div');
    row.className = 'message-row ' + role;

    const now = formatTime(new Date());

    if (role === 'user') {
      row.innerHTML =
        '<div class="msg-avatar user">C</div>' +
        '<div>' +
          '<div class="msg-bubble user">' + escapeHtml(text) + '</div>' +
          '<div class="msg-meta" style="justify-content:flex-end;">' +
            (via ? '<span class="msg-via">' + escapeHtml(via) + '</span>' : '') +
            '<span class="msg-time">' + now + '</span>' +
          '</div>' +
        '</div>';
    } else if (role === 'assistant') {
      row.innerHTML =
        '<div class="msg-avatar agent">' + agentInitial + '</div>' +
        '<div>' +
          '<div class="msg-bubble assistant">' + escapeHtml(text) + '</div>' +
          '<div class="msg-meta">' +
            '<span class="msg-time">' + now + '</span>' +
          '</div>' +
        '</div>';
    } else {
      // System / error message
      row.className = 'message-row assistant';
      row.innerHTML =
        '<div class="msg-avatar agent" style="background:var(--accent-danger);">!</div>' +
        '<div>' +
          '<div class="msg-bubble assistant" style="border-left-color:var(--accent-danger);">' + escapeHtml(text) + '</div>' +
          '<div class="msg-meta"><span class="msg-time">' + now + '</span></div>' +
        '</div>';
    }

    chatArea.appendChild(row);
    scrollToBottom();
  }

  // ─── Exposed Functions ───
  window.toggleVoice = async function() {
    if (isVoiceActive) {
      isVoiceActive = false;
      stopCapture();
      updateVoiceUI();
      setStatus('connected', 'Voice paused');
    } else {
      if (!ws || ws.readyState !== WebSocket.OPEN) {
        setStatus('error', 'Not connected');
        return;
      }
      isVoiceActive = true;
      updateVoiceUI();
      await startCapture();
      setStatus('listening', 'Listening...');
    }
  };

  window.sendTextMessage = function() {
    const text = textInput.value.trim();
    if (!text) return;
    if (!ws || ws.readyState !== WebSocket.OPEN) {
      setStatus('error', 'Not connected');
      return;
    }

    // Send to server
    ws.send(JSON.stringify({ type: 'text_message', text: text }));

    // Show in chat
    addMessage('user', text, 'text');

    // Clear input
    textInput.value = '';
    textInput.style.height = 'auto';
    btnSend.disabled = true;
    textInput.focus();
  };

  window.clearHistory = function() {
    chatArea.innerHTML = '';
    messageCount = 0;
    clearCachedSession();

    const es = document.createElement('div');
    es.className = 'empty-state';
    es.id = 'empty-state';
    es.innerHTML =
      '<div class="agent-icon">' + agentInitial + '</div>' +
      '<h2>Chat with ' + agentDisplayName + '</h2>' +
      '<p>Type a message or tap the microphone to start a voice conversation.</p>';
    chatArea.appendChild(es);

    if (ws && ws.readyState === WebSocket.OPEN) {
      ws.send('CLEAR_HISTORY');
    }
  };

  // ─── Init ───
  connectWS();

  // Check for cached session after WebSocket connects
  const _origOnOpen = null;
  const _wsCheckInterval = setInterval(function() {
    if (ws && ws.readyState === WebSocket.OPEN) {
      clearInterval(_wsCheckInterval);
      const cached = loadCachedSession();
      if (cached && cached.length > 0) {
        showResumePrompt(cached);
      }
    }
  }, 200);

  // Keep-alive ping every 15s
  setInterval(function() {
    if (ws && ws.readyState === WebSocket.OPEN) {
      ws.send(JSON.stringify({ type: 'ping' }));
    }
  }, 15000);

})();
</script>
</body>
</html>
