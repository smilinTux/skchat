<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>SK Space</title>
<script src="https://cdn.jsdelivr.net/npm/livekit-client@2.6.0/dist/livekit-client.umd.min.js"></script>
<style>
  :root {
    --bg:#0b0d10; --surface:#13161b; --line:#222831; --text:#e6e9ee;
    --muted:#8b94a3; --accent:#2dd4bf; --accent-2:#14b8a6; --self:#3b82f6;
    --radius:14px; --gap:14px;
  }
  * { box-sizing:border-box; }
  body { margin:0; background:var(--bg); color:var(--text);
    font-family:Inter,system-ui,sans-serif; }
  header { padding:18px 20px; border-bottom:1px solid var(--line);
    display:flex; align-items:center; gap:12px; }
  header h1 { font-size:17px; margin:0; font-weight:600; }
  #rec { display:none; color:#ef4444; font-size:12px; font-weight:600; }
  main { padding:20px; max-width:920px; margin:0 auto; }
  .speakers { display:flex; flex-wrap:wrap; gap:var(--gap); }
  .speaker { display:flex; flex-direction:column; align-items:center; gap:8px;
    width:96px; }
  .ring { width:72px; height:72px; border-radius:50%; background:var(--surface);
    border:2px solid var(--line); display:grid; place-items:center;
    font-size:22px; transition:box-shadow .18s, border-color .18s; }
  .ring.speaking { border-color:var(--accent);
    box-shadow:0 0 0 4px rgba(45,212,191,.18); animation:pulse 1s infinite; }
  @keyframes pulse { 50% { box-shadow:0 0 0 7px rgba(45,212,191,.10); } }
  .name { font-size:12px; color:var(--muted); }
  .bar { display:flex; gap:10px; align-items:center; margin-top:24px; }
  button { background:var(--accent); color:#04201c; border:0; border-radius:11px;
    padding:10px 16px; font-weight:600; cursor:pointer; }
  button.ghost { background:transparent; color:var(--text);
    border:1px solid var(--line); }
  button.ghost.live { background:var(--accent); color:#04201c; border-color:transparent; }
  button:disabled { opacity:.5; cursor:default; }
  .count { color:var(--muted); font-size:13px; margin-left:auto; }
  .step { color:var(--muted); font-size:13px; min-height:18px; margin-top:12px; }
  .icon-btn { background:transparent; border:0; color:var(--text); font-size:16px;
    line-height:1; cursor:pointer; padding:6px 8px; border-radius:8px; }
  .icon-btn:hover { background:var(--surface); }
  .share-notice { color:var(--accent); font-size:12px; }
  .invited-banner { display:flex; align-items:center; gap:10px; margin-top:16px;
    padding:10px 14px; background:rgba(45,212,191,.12); border:1px solid var(--accent);
    border-radius:11px; font-size:13px; }
  .invited-banner span { flex:1; }
  .invited-banner button:not(.icon-btn) { padding:6px 12px; font-size:13px; }
  .join-card { max-width:360px; margin:60px auto 0; background:var(--surface);
    border:1px solid var(--line); border-radius:var(--radius); padding:24px;
    text-align:center; }
  .join-card h2 { margin:0 0 18px; font-size:16px; font-weight:600; }
  .join-card label { display:block; text-align:left; font-size:12px;
    color:var(--muted); margin-bottom:6px; }
  .join-card input { width:100%; padding:10px 12px; border-radius:10px;
    border:1px solid var(--line); background:#0f1216; color:var(--text);
    font-size:14px; margin-bottom:16px; }
  .join-card button { width:100%; }
</style>
</head>
<body>
<header>
  <h1 id="title">SK Space</h1>
  <button class="icon-btn" id="share" title="Share space link" aria-label="Share space link">🔗</button>
  <span class="share-notice" id="shareNotice" aria-live="polite"></span>
  <span id="rec">● REC</span>
</header>
<main>
  <section class="join-card" id="joinCard">
    <h2 id="joinCardTitle">SK Space</h2>
    <label for="nameInput">Your name</label>
    <input id="nameInput" type="text" maxlength="40" autocomplete="off" spellcheck="false" />
    <button id="join">Join</button>
  </section>
  <div class="speakers" id="speakers"></div>
  <div class="invited-banner" id="invitedBanner" style="display:none">
    <span id="invitedText">The host invited you to speak.</span>
    <button id="invitedJoin">Join stage</button>
    <button class="icon-btn" id="invitedDismiss" aria-label="Dismiss invite" title="Dismiss">✕</button>
  </div>
  <div class="bar">
    <button class="ghost" id="mic" style="display:none" disabled>🎙️ Unmute</button>
    <button class="ghost" id="hand" disabled>✋ Raise hand</button>
    <button class="ghost" id="end" style="display:none">End</button>
    <span class="count" id="count">not connected</span>
  </div>
  <div class="step" id="step"></div>
</main>
<script>
  const LK = window.LivekitClient;
  const qs = new URLSearchParams(location.search);
  // strip any stray chars copied into the URL (e.g. a trailing backtick from markdown)
  const spaceId = (location.pathname.split("/").pop() || "").replace(/[^a-z0-9-]/gi, "");
  const step = (t) => document.getElementById("step").textContent = t;
  let room;
  let micEnabled = false;  // X Spaces model: promotion/join never auto-publishes; user must click Unmute
  let invitedDismissed = false;  // dismiss [x] on the invited banner, latched until re-invited
  let wasInvited = false;  // tracks the false -> true edge that re-arms a dismissed banner

  // Guest alias: pre-filled, editable, remembered across visits. No account needed.
  const NAME_STORE_KEY = "skchat.space.guestName";
  // localStorage access can THROW (Safari private mode, storage-disabled policy,
  // sandboxed iframe). Never let that kill the script block at load or break the
  // Join click: guard every touch and fall back to an in-memory store for the session.
  const memStore = {};
  function safeStorageGet(key) {
    try { return localStorage.getItem(key); }
    catch (e) { return Object.prototype.hasOwnProperty.call(memStore, key) ? memStore[key] : null; }
  }
  function safeStorageSet(key, value) {
    try { localStorage.setItem(key, value); }
    catch (e) { memStore[key] = value; }
  }
  const GUEST_ANIMALS = ["Falcon","Otter","Panda","Lynx","Heron","Wolf","Finch","Marlin",
    "Badger","Sparrow","Orca","Ibex","Kite","Puffin","Raven","Stag","Tapir","Wren",
    "Yak","Zebra","Bison","Coyote","Dingo","Egret"];
  function randomGuestAlias() {
    const animal = GUEST_ANIMALS[Math.floor(Math.random() * GUEST_ANIMALS.length)];
    const digits = String(10 + Math.floor(Math.random() * 90));  // 2 digits
    return `Guest-${animal}${digits}`;
  }
  function initialGuestName() {
    // ?name= (legacy query-param join path) still wins if present, so old invite
    // links keep working; otherwise prefer the remembered name, then a fresh alias.
    const fromQuery = (qs.get("name") || "").trim();
    if (fromQuery) return fromQuery;
    const saved = (safeStorageGet(NAME_STORE_KEY) || "").trim();
    return saved || randomGuestAlias();
  }
  const nameInput = document.getElementById("nameInput");
  nameInput.value = initialGuestName();
  document.getElementById("joinCardTitle").textContent = document.getElementById("title").textContent;

  // Show/hide + label the mic button from the current permission + mic state.
  // Called on connect, on every ParticipantPermissionsChanged event (the promotion race
  // this button exists to close) and after every toggle attempt, success or failure.
  function updateMicButton() {
    const btn = document.getElementById("mic");
    const canPublish = !!room?.localParticipant?.permissions?.canPublish;
    if (!canPublish) {
      btn.style.display = "none";
      btn.classList.remove("live");
      micEnabled = false;
      return;
    }
    btn.style.display = "inline-block";
    btn.disabled = false;
    btn.textContent = micEnabled ? "🔇 Mute" : "🎙️ Unmute";
    btn.classList.toggle("live", micEnabled);
  }

  // Mirror the server's consent AND-gate (spec §5: on_stage = hand_raised AND
  // invited_to_stage) on the guest's own metadata. Covers the gap the operator
  // hit: invited_to_stage flips true but the guest never raised their hand, so
  // ParticipantPermissionsChanged (which only fires once BOTH flags are true)
  // never lands and the invite is invisible. Called after connect and on every
  // ParticipantMetadataChanged (both already routed through renderSpeakers).
  function updateInvitedBanner() {
    const banner = document.getElementById("invitedBanner");
    const handBtn = document.getElementById("hand");
    const p = room?.localParticipant;
    let meta = {};
    if (p) {
      try { meta = JSON.parse(p.metadata || "{}"); } catch (_) { /* ignore */ }
    }
    const invited = !!meta.invited_to_stage;
    const handRaised = !!meta.hand_raised;
    const canPublish = !!p?.permissions?.canPublish;
    if (invited && !wasInvited) invitedDismissed = false;  // re-arm on false -> true
    wasInvited = invited;
    const showBanner = invited && !handRaised && !canPublish && !invitedDismissed;
    banner.style.display = showBanner ? "flex" : "none";
    // Same control, same action: while invited and not yet publishing, the
    // standalone raise-hand button in the control bar relabels too.
    handBtn.textContent = (invited && !canPublish) ? "Join stage" : "✋ Raise hand";
  }

  // Turn a getUserMedia / publish failure into a plain, non-blocking status line.
  function micErrorMessage(e) {
    const name = e && e.name || "";
    if (name === "NotAllowedError" || name === "PermissionDeniedError" || name === "SecurityError") {
      return "Mic permission denied. Allow microphone access for this site, then try again.";
    }
    if (name === "NotFoundError" || name === "DevicesNotFoundError" || name === "OverconstrainedError") {
      return "No microphone found. Connect one and try again.";
    }
    if (name === "NotReadableError" || name === "TrackStartError") {
      return "Microphone is busy or unavailable, maybe another app has it open. Try again.";
    }
    return "Mic error: " + ((e && e.message) || String(e));
  }

  async function getToken() {
    // ?host=<fqid> → join as host (publish + controls); else join as a listener.
    const host = (qs.get("host") || "").replace(/[^a-z0-9@._-]/gi, "");
    if (host) {
      const res = await fetch(`/spaces/${spaceId}/join-host`, {
        method:"POST", headers:{"content-type":"application/json"},
        body: JSON.stringify({ requester: host })
      });
      if (!res.ok) throw new Error("host join failed: " + res.status);
      return res.json();
    }
    const identity = qs.get("identity") || ("listener-" + Math.random().toString(36).slice(2,8));
    const name = (nameInput.value || "").trim() || randomGuestAlias();
    const res = await fetch(`/spaces/${spaceId}/join`, {
      method:"POST", headers:{"content-type":"application/json"},
      body: JSON.stringify({ identity, name })
    });
    if (!res.ok) throw new Error("join failed: " + res.status);
    return res.json();
  }

  function renderSpeakers() {
    const el = document.getElementById("speakers");
    el.innerHTML = "";
    const parts = [room.localParticipant, ...room.remoteParticipants.values()];
    let listeners = 0;
    for (const p of parts) {
      const canSpeak = p.permissions?.canPublish;
      if (!canSpeak) {
        listeners++;
        try {
          const meta = JSON.parse(p.metadata || "{}");
          if (meta.hand_raised && hostFqid) {
            const wrap = document.createElement("div"); wrap.className = "speaker";
            const ring = document.createElement("div");
            ring.className = "ring"; ring.id = "ring-" + p.identity;
            ring.textContent = "✋"; ring.style.borderColor = "var(--accent)";
            const name = document.createElement("div"); name.className = "name";
            name.textContent = p.name || p.identity;
            wrap.append(ring, name); el.append(wrap);
          }
        } catch (_) {}
        continue;
      }
      const wrap = document.createElement("div"); wrap.className = "speaker";
      const ring = document.createElement("div");
      ring.className = "ring" + (p.isSpeaking ? " speaking" : "");
      ring.id = "ring-" + p.identity; ring.textContent = "🎙️";
      const name = document.createElement("div"); name.className = "name";
      name.textContent = p.name || p.identity;
      wrap.append(ring, name); el.append(wrap);
    }
    document.getElementById("count").textContent = `${listeners} listening`;
    updateInvitedBanner();
  }

  document.getElementById("join").onclick = async () => {
    // No empty names: fall back to a fresh generated alias, same as an empty
    // localStorage read would. Persist whatever we actually join with.
    const chosenName = (nameInput.value || "").trim() || randomGuestAlias();
    nameInput.value = chosenName;
    safeStorageSet(NAME_STORE_KEY, chosenName);
    try {
      step("Connecting…");
      const { url, token, title } = await getToken();
      document.getElementById("title").textContent = title || "SK Space";
      room = new LK.Room({ adaptiveStream:true });
      room.on(LK.RoomEvent.ActiveSpeakersChanged, renderSpeakers);
      room.on(LK.RoomEvent.ParticipantConnected, renderSpeakers);
      room.on(LK.RoomEvent.ParticipantDisconnected, renderSpeakers);
      room.on(LK.RoomEvent.ParticipantMetadataChanged, renderSpeakers);
      room.on(LK.RoomEvent.TrackSubscribed, (track) => {
        if (track.kind === "audio") track.attach();  // play speaker audio
      });
      room.on(LK.RoomEvent.ParticipantPermissionsChanged, async (prev, p) => {
        if (p === room.localParticipant) {
          const canPublish = !!p.permissions?.canPublish;
          if (!canPublish && micEnabled) {
            // demoted mid-session while live: force-mute, never leave a hot mic behind
            try { await room.localParticipant.setMicrophoneEnabled(false); } catch (_) { /* ignore */ }
            micEnabled = false;
            step("Removed from stage, mic muted.");
          } else if (canPublish) {
            // promoted: X Spaces model, land muted, the human clicks Unmute
            step("You're on stage, click Unmute to go live.");
          }
          updateMicButton();
        }
        renderSpeakers();
      });
      await room.connect(url, token);
      renderSpeakers();
      updateMicButton();
      document.getElementById("joinCard").style.display = "none";
      document.getElementById("hand").disabled = false;
      if (hostFqid) document.getElementById("end").style.display = "inline";
      if (room.localParticipant.permissions?.canPublish) {
        step("Connected, click Unmute to go live.");
      } else {
        step("Connected, listening.");
      }
    } catch (e) { step("Error: " + e.message); }
  };

  document.getElementById("mic").onclick = async () => {
    const btn = document.getElementById("mic");
    if (!room?.localParticipant?.permissions?.canPublish) return;
    btn.disabled = true;
    const next = !micEnabled;
    try {
      await room.localParticipant.setMicrophoneEnabled(next);
      micEnabled = next;
      step(micEnabled ? "Mic live." : "Mic muted.");
    } catch (e) {
      // getUserMedia/publish failed: leave micEnabled unchanged so the button stays
      // in a retryable state, surface a plain non-blocking message instead of failing silently
      step(micErrorMessage(e));
    } finally {
      updateMicButton();
    }
  };

  async function pollRec() {
    try {
      const { spaces } = await (await fetch("/spaces")).json();
      const me = spaces.find(s => s.space_id === spaceId);
      document.getElementById("rec").style.display =
        (me && me.recording) ? "inline" : "none";
    } catch (_) {}
  }
  setInterval(pollRec, 4000);

  // Share: native share sheet where available (phone browsers, iMessage/Telegram/
  // email picker), else copy the link and show a brief inline "Link copied" notice.
  document.getElementById("share").onclick = async () => {
    const link = location.origin + "/space/" + spaceId;
    const notice = document.getElementById("shareNotice");
    const flashNotice = (t) => {
      notice.textContent = t;
      setTimeout(() => { notice.textContent = ""; }, 2500);
    };
    if (navigator.share) {
      try {
        await navigator.share({ title: document.getElementById("title").textContent || "SK Space", url: link });
        return;
      } catch (e) {
        // user cancelled the native sheet, or share isn't actually usable here,
        // fall through to the clipboard fallback below
      }
    }
    try {
      await navigator.clipboard.writeText(link);
      flashNotice("Link copied");
    } catch (e) {
      flashNotice(link);
    }
  };

  // Shared by the control-bar raise-hand button and the invited banner's Join
  // stage button: same endpoint, same fetch, same accept action either way.
  // response.on_stage is authoritative: true means the AND-gate closed and the
  // ParticipantPermissionsChanged handler above will land the "You're on
  // stage" step text; false means still gated on the other half (rare race:
  // the host revoked the invite between render and click), so surface the
  // same pending copy the plain raise-hand flow already used.
  async function raiseHand() {
    const identity = room?.localParticipant?.identity;
    if (!identity) return;
    const res = await fetch(`/spaces/${spaceId}/raise-hand`, {
      method:"POST", headers:{"content-type":"application/json"},
      body: JSON.stringify({ identity })
    });
    let onStage = false;
    try { onStage = !!(await res.json()).on_stage; } catch (_) { /* ignore */ }
    if (!onStage) step("✋ hand raised, waiting for the host.");
  }
  document.getElementById("hand").onclick = raiseHand;
  document.getElementById("invitedJoin").onclick = raiseHand;
  document.getElementById("invitedDismiss").onclick = () => {
    invitedDismissed = true;
    updateInvitedBanner();
  };

  const hostFqid = (qs.get("host") || "").replace(/[^a-z0-9@._-]/gi, "") || null;  // host controls
  async function hostAction(path, identity, extra = {}) {
    await fetch(`/spaces/${spaceId}/${path}`, {
      method:"POST", headers:{"content-type":"application/json"},
      body: JSON.stringify({ requester: hostFqid, identity, ...extra })
    });
  }
  // host control endpoints wired in the page (delegated ring click → action):
  //   /spaces/{id}/invite · /spaces/{id}/remove-from-stage · /spaces/{id}/kick
  const HOST_ACTIONS = ["invite", "remove-from-stage", "kick"];
  document.getElementById("speakers").addEventListener("click", async (e) => {
    if (!hostFqid) return;
    const ring = e.target.closest(".ring"); if (!ring) return;
    const identity = ring.id.replace("ring-", "");
    const act = prompt(`Action for ${identity}: ${HOST_ACTIONS.join(" / ")}`);
    if (!act || !HOST_ACTIONS.includes(act.trim())) return;
    await hostAction(act.trim(), identity);
    step(`${act} → ${identity}`);
  });

  document.getElementById("end").onclick = async () => {
    await fetch(`/spaces/${spaceId}/end`, {
      method:"POST", headers:{"content-type":"application/json"},
      body: JSON.stringify({ requester: hostFqid })
    });
    if (room) room.disconnect();
    step("Space ended.");
  };
</script>
</body>
</html>
