<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Group Chat — SKChat</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg: #000000;
  --surface-raised: #0A0A0F;
  --surface-glass: rgba(255,255,255,0.06);
  --surface-glass-border: rgba(255,255,255,0.08);
  --text-primary: #E8E8F0;
  --text-secondary: #808098;
  --text-tertiary: #505068;
  --accent-encrypt: #10B981;
  --accent-danger: #EF4444;
  --soul-color: #BB86FC;
  --font-primary: 'Inter', system-ui, -apple-system, sans-serif;
  --font-mono: 'JetBrains Mono', monospace;
}

html, body {
  height: 100%;
  overflow: hidden;
}

body {
  background: var(--bg);
  color: var(--text-primary);
  font-family: var(--font-primary);
  display: flex;
  flex-direction: column;
  height: 100dvh;
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
}

/* ─── Header ─── */
.app-header {
  padding: 12px 16px;
  display: flex;
  align-items: center;
  gap: 10px;
  background: var(--surface-raised);
  border-bottom: 1px solid var(--surface-glass-border);
  flex-shrink: 0;
  z-index: 10;
}

.group-avatar-header {
  width: 32px;
  height: 32px;
  border-radius: 50%;
  background: linear-gradient(135deg, #BB86FC, #00E5FF, #10B981, #FFC107);
  display: flex;
  align-items: center;
  justify-content: center;
  font-weight: 700;
  font-size: 14px;
  color: #000;
  flex-shrink: 0;
}

.header-info {
  flex: 1;
  min-width: 0;
}

.agent-name {
  font-size: 16px;
  font-weight: 600;
  color: var(--text-primary);
  display: flex;
  align-items: center;
  gap: 6px;
}

.header-subtitle {
  font-size: 12px;
  color: var(--text-secondary);
  margin-top: 1px;
}

#status-badge {
  font-size: 11px;
  font-weight: 500;
  padding: 3px 10px;
  border-radius: 12px;
  background: var(--surface-glass);
  border: 1px solid var(--surface-glass-border);
  color: var(--text-tertiary);
  transition: all 0.3s ease;
  white-space: nowrap;
}

#status-badge.connected { border-color: var(--accent-encrypt); color: var(--accent-encrypt); }
#status-badge.listening { border-color: #F59E0B; color: #F59E0B; animation: pulse 1s infinite; }
#status-badge.processing { border-color: #60A5FA; color: #60A5FA; }
#status-badge.error { border-color: var(--accent-danger); color: var(--accent-danger); }

.header-actions {
  display: flex;
  gap: 6px;
  flex-shrink: 0;
}

.btn-icon {
  width: 36px;
  height: 36px;
  border-radius: 10px;
  border: 1px solid var(--surface-glass-border);
  background: var(--surface-glass);
  color: var(--text-secondary);
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: all 0.2s ease;
  font-size: 16px;
}

.btn-icon:hover {
  background: rgba(255,255,255,0.10);
  color: var(--text-primary);
}

.btn-icon.voice-active {
  background: rgba(239,68,68,0.15);
  border-color: rgba(239,68,68,0.4);
  color: var(--accent-danger);
  animation: pulse-ring 1.5s infinite;
}

@keyframes pulse {
  0%, 100% { opacity: 1; }
  50% { opacity: 0.5; }
}

@keyframes pulse-ring {
  0% { box-shadow: 0 0 0 0 rgba(239,68,68,0.3); }
  70% { box-shadow: 0 0 0 8px rgba(239,68,68,0); }
  100% { box-shadow: 0 0 0 0 rgba(239,68,68,0); }
}

/* ─── Agent Chips Bar ─── */
.agent-chips-bar {
  display: flex;
  gap: 8px;
  padding: 8px 16px;
  background: var(--surface-raised);
  border-bottom: 1px solid var(--surface-glass-border);
  overflow-x: auto;
  flex-shrink: 0;
  -webkit-overflow-scrolling: touch;
  scrollbar-width: none;
}

.agent-chips-bar::-webkit-scrollbar {
  display: none;
}

.agent-chip {
  display: flex;
  align-items: center;
  gap: 6px;
  padding: 5px 12px 5px 5px;
  border-radius: 20px;
  border: 1.5px solid var(--surface-glass-border);
  background: var(--surface-glass);
  cursor: pointer;
  transition: all 0.2s ease;
  flex-shrink: 0;
  user-select: none;
  -webkit-user-select: none;
}

.agent-chip:hover {
  background: rgba(255,255,255,0.08);
}

.agent-chip.active {
  border-color: var(--chip-color, var(--text-secondary));
  background: rgba(255,255,255,0.08);
}

.agent-chip.inactive {
  opacity: 0.4;
}

.agent-chip-dot {
  width: 24px;
  height: 24px;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-weight: 700;
  font-size: 11px;
  color: #000;
  flex-shrink: 0;
}

.agent-chip-name {
  font-size: 12px;
  font-weight: 500;
  color: var(--text-primary);
  white-space: nowrap;
}

.agent-chip.inactive .agent-chip-name {
  color: var(--text-tertiary);
}

/* ─── Voice Visualizer Bar ─── */
#voice-visualizer {
  height: 0;
  overflow: hidden;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 2px;
  background: var(--surface-raised);
  border-bottom: 1px solid var(--surface-glass-border);
  transition: height 0.3s ease;
  flex-shrink: 0;
}

#voice-visualizer.active {
  height: 40px;
  padding: 4px 16px;
}

.viz-bar {
  width: 3px;
  background: #BB86FC;
  border-radius: 2px;
  transition: height 0.05s ease;
  height: 4px;
  opacity: 0.7;
}

/* ─── Chat Area ─── */
#chat-area {
  flex: 1;
  overflow-y: auto;
  overflow-x: hidden;
  padding: 16px;
  display: flex;
  flex-direction: column;
  gap: 8px;
  scroll-behavior: smooth;
  overscroll-behavior: contain;
}

#chat-area::-webkit-scrollbar {
  width: 4px;
}

#chat-area::-webkit-scrollbar-track {
  background: transparent;
}

#chat-area::-webkit-scrollbar-thumb {
  background: rgba(255,255,255,0.1);
  border-radius: 2px;
}

/* ─── Messages ─── */
.message-row {
  display: flex;
  gap: 8px;
  max-width: 85%;
  animation: msg-in 0.25s ease-out;
}

.message-row.user {
  align-self: flex-end;
  flex-direction: row-reverse;
}

.message-row.assistant {
  align-self: flex-start;
}

@keyframes msg-in {
  from { opacity: 0; transform: translateY(8px); }
  to { opacity: 1; transform: translateY(0); }
}

.msg-avatar {
  width: 28px;
  height: 28px;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-weight: 600;
  font-size: 12px;
  flex-shrink: 0;
  align-self: flex-end;
  margin-bottom: 2px;
}

.msg-avatar.user {
  background: #FFC107;
  color: #000;
}

.msg-bubble {
  padding: 8px 12px;
  font-size: 14px;
  line-height: 1.5;
  word-wrap: break-word;
  overflow-wrap: break-word;
}

.msg-bubble.user {
  background: rgba(255,193,7,0.18);
  border: 1px solid rgba(255,193,7,0.30);
  border-radius: 16px 16px 4px 16px;
  color: var(--text-primary);
}

.msg-bubble.assistant {
  background: var(--surface-glass);
  border: 1px solid var(--surface-glass-border);
  border-radius: 16px 16px 16px 4px;
  color: var(--text-primary);
}

.msg-agent-label {
  font-size: 11px;
  font-weight: 600;
  margin-bottom: 2px;
}

.msg-meta {
  display: flex;
  align-items: center;
  gap: 6px;
  margin-top: 4px;
}

.msg-time {
  font-size: 10px;
  color: var(--text-tertiary);
  font-family: var(--font-mono);
}

.msg-via {
  font-size: 10px;
  color: var(--text-tertiary);
  font-style: italic;
}

/* Status indicator in chat */
.status-indicator {
  align-self: flex-start;
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 6px 12px;
  font-size: 12px;
  color: var(--text-secondary);
  animation: msg-in 0.25s ease-out;
}

.status-indicator .typing-dots {
  display: flex;
  gap: 3px;
}

.status-indicator .typing-dots span {
  width: 5px;
  height: 5px;
  border-radius: 50%;
  background: var(--text-secondary);
  animation: typing-bounce 1.2s infinite;
}

.status-indicator .typing-dots span:nth-child(2) { animation-delay: 0.2s; }
.status-indicator .typing-dots span:nth-child(3) { animation-delay: 0.4s; }

@keyframes typing-bounce {
  0%, 60%, 100% { transform: translateY(0); opacity: 0.4; }
  30% { transform: translateY(-4px); opacity: 1; }
}

/* ─── Input Area ─── */
.input-area {
  padding: 8px 12px;
  padding-bottom: max(8px, env(safe-area-inset-bottom));
  background: rgba(10,10,15,0.85);
  backdrop-filter: blur(16px);
  -webkit-backdrop-filter: blur(16px);
  border-top: 1px solid var(--surface-glass-border);
  display: flex;
  align-items: flex-end;
  gap: 8px;
  flex-shrink: 0;
  z-index: 10;
}

.input-wrapper {
  flex: 1;
  display: flex;
  align-items: flex-end;
  background: var(--surface-glass);
  border: 1px solid var(--surface-glass-border);
  border-radius: 20px;
  padding: 4px 4px 4px 14px;
  transition: border-color 0.2s ease;
  min-height: 40px;
}

.input-wrapper:focus-within {
  border-color: rgba(255,255,255,0.15);
}

#text-input {
  flex: 1;
  background: none;
  border: none;
  outline: none;
  color: var(--text-primary);
  font-family: var(--font-primary);
  font-size: 14px;
  line-height: 1.4;
  resize: none;
  max-height: 120px;
  padding: 6px 0;
}

#text-input::placeholder {
  color: var(--text-tertiary);
}

.btn-send {
  width: 32px;
  height: 32px;
  border-radius: 50%;
  border: none;
  background: linear-gradient(135deg, #BB86FC, #00E5FF);
  color: #000;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
  transition: all 0.2s ease;
  font-size: 14px;
}

.btn-send:hover {
  transform: scale(1.05);
  filter: brightness(1.1);
}

.btn-send:disabled {
  background: var(--text-tertiary);
  cursor: default;
  transform: none;
  filter: none;
}

.btn-voice-input {
  width: 40px;
  height: 40px;
  border-radius: 50%;
  border: 2px solid var(--surface-glass-border);
  background: var(--surface-glass);
  color: var(--text-secondary);
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
  transition: all 0.2s ease;
  font-size: 18px;
}

.btn-voice-input:hover {
  border-color: #BB86FC;
  color: #BB86FC;
}

.btn-voice-input.active {
  border-color: var(--accent-danger);
  color: var(--accent-danger);
  background: rgba(239,68,68,0.12);
  animation: pulse-ring 1.5s infinite;
}

/* ─── Empty State ─── */
.empty-state {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 12px;
  color: var(--text-tertiary);
  padding: 32px;
  text-align: center;
}

.empty-state .group-icon-large {
  width: 56px;
  height: 56px;
  border-radius: 50%;
  background: linear-gradient(135deg, #BB86FC, #00E5FF, #10B981, #FFC107);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 24px;
  font-weight: 700;
  color: #000;
  margin-bottom: 4px;
}

.empty-state h2 {
  font-size: 18px;
  font-weight: 600;
  color: var(--text-secondary);
}

.empty-state p {
  font-size: 13px;
  line-height: 1.5;
  max-width: 280px;
}

/* ─── Responsive ─── */
@media (min-width: 640px) {
  #chat-area { padding: 20px 32px; }
  .message-row { max-width: 70%; }
  .input-area { padding: 12px 24px; }
}

@media (min-width: 1024px) {
  body {
    max-width: 800px;
    margin: 0 auto;
    border-left: 1px solid var(--surface-glass-border);
    border-right: 1px solid var(--surface-glass-border);
  }
}
</style>
</head>
<body>

<!-- Header -->
<header class="app-header">
  <div class="group-avatar-header">G</div>
  <div class="header-info">
    <div class="agent-name">
      <span>Group Chat</span>
    </div>
    <div class="header-subtitle" id="header-subtitle">0 agents active</div>
  </div>
  <span id="status-badge">ready</span>
  <div class="header-actions">
    <button class="btn-icon" id="btn-back" title="Back to agent list" onclick="location.href='/voice/lumina'">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/></svg>
    </button>
    <button class="btn-icon" id="btn-clear" title="Clear conversation" onclick="clearHistory()">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg>
    </button>
    <button class="btn-icon" id="btn-voice-toggle" title="Toggle voice mode" onclick="toggleVoice()">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/><path d="M19 10v2a7 7 0 0 1-14 0v-2"/><line x1="12" y1="19" x2="12" y2="23"/><line x1="8" y1="23" x2="16" y2="23"/></svg>
    </button>
  </div>
</header>

<!-- Agent Chips -->
<div class="agent-chips-bar" id="agent-chips-bar"></div>

<!-- Voice Visualizer -->
<div id="voice-visualizer"></div>

<!-- Chat Area -->
<div id="chat-area">
  <div class="empty-state" id="empty-state">
    <div class="group-icon-large">G</div>
    <h2>Group Voice Chat</h2>
    <p>Toggle agents above, then type or speak. All active agents will respond.</p>
  </div>
</div>

<!-- Status Indicator (typing/thinking) -->
<div class="status-indicator" id="status-indicator" style="display:none;">
  <div class="typing-dots"><span></span><span></span><span></span></div>
  <span id="status-label">Thinking...</span>
</div>

<!-- Input Area -->
<div class="input-area">
  <div class="input-wrapper">
    <textarea id="text-input" rows="1" placeholder="Message all agents..." autocomplete="off"></textarea>
    <button class="btn-send" id="btn-send" onclick="sendTextMessage()" disabled title="Send message">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
    </button>
  </div>
  <button class="btn-voice-input" id="btn-voice-bottom" onclick="toggleVoice()" title="Hold to talk">
    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/><path d="M19 10v2a7 7 0 0 1-14 0v-2"/><line x1="12" y1="19" x2="12" y2="23"/><line x1="8" y1="23" x2="16" y2="23"/></svg>
  </button>
</div>

<script>
(function() {
  'use strict';

  // ─── Agent Definitions ───
  const AGENTS = [
    { name: 'lumina',    color: '#BB86FC', enabled: true },
    { name: 'jarvis',    color: '#00E5FF', enabled: true },
    { name: 'opus',      color: '#10B981', enabled: false },
    { name: 'artisan',   color: '#808098', enabled: false },
    { name: 'coder',     color: '#808098', enabled: false },
    { name: 'architect', color: '#808098', enabled: false },
    { name: 'scholar',   color: '#808098', enabled: false },
    { name: 'herald',    color: '#808098', enabled: false },
    { name: 'sentinel',  color: '#808098', enabled: false },
    { name: 'steward',   color: '#808098', enabled: false },
  ];

  // ─── State ───
  const agentSockets = {};   // name -> WebSocket
  let audioCtx = null;
  let mediaStream = null;
  let scriptProcessor = null;
  let isVoiceActive = false;
  let messageCount = 0;

  // Audio playback queue (sequential across all agents)
  let audioQueue = [];
  let isPlayingAudio = false;

  // Track which agents are thinking
  const agentThinking = {};

  const SAMPLE_RATE = 16000;

  // ─── DOM Refs ───
  const statusBadge     = document.getElementById('status-badge');
  const chatArea        = document.getElementById('chat-area');
  const textInput       = document.getElementById('text-input');
  const btnSend         = document.getElementById('btn-send');
  const btnVoiceToggle  = document.getElementById('btn-voice-toggle');
  const btnVoiceBottom  = document.getElementById('btn-voice-bottom');
  const visualizer      = document.getElementById('voice-visualizer');
  const statusIndicator = document.getElementById('status-indicator');
  const statusLabel     = document.getElementById('status-label');
  const headerSubtitle  = document.getElementById('header-subtitle');
  const chipsBar        = document.getElementById('agent-chips-bar');

  // Create visualizer bars
  for (let i = 0; i < 32; i++) {
    const bar = document.createElement('div');
    bar.className = 'viz-bar';
    visualizer.appendChild(bar);
  }
  const vizBars = visualizer.querySelectorAll('.viz-bar');

  // ─── Helpers ───
  function capitalize(s) { return s.charAt(0).toUpperCase() + s.slice(1); }

  function hexToRgb(hex) {
    const r = parseInt(hex.slice(1,3), 16);
    const g = parseInt(hex.slice(3,5), 16);
    const b = parseInt(hex.slice(5,7), 16);
    return { r: r, g: g, b: b };
  }

  function formatTime(date) {
    return date.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
  }

  function escapeHtml(str) {
    const div = document.createElement('div');
    div.textContent = str;
    return div.innerHTML;
  }

  function scrollToBottom() {
    requestAnimationFrame(function() {
      chatArea.scrollTop = chatArea.scrollHeight;
    });
  }

  function getActiveAgents() {
    return AGENTS.filter(function(a) { return a.enabled; });
  }

  function updateSubtitle() {
    const active = getActiveAgents();
    headerSubtitle.textContent = active.length + ' agent' + (active.length !== 1 ? 's' : '') + ' active';
  }

  // ─── Build Agent Chips ───
  function buildChips() {
    chipsBar.innerHTML = '';
    AGENTS.forEach(function(agent) {
      const chip = document.createElement('div');
      chip.className = 'agent-chip ' + (agent.enabled ? 'active' : 'inactive');
      chip.style.setProperty('--chip-color', agent.color);
      chip.dataset.agent = agent.name;

      const initial = capitalize(agent.name).charAt(0);
      chip.innerHTML =
        '<div class="agent-chip-dot" style="background:' + agent.color + ';">' + initial + '</div>' +
        '<span class="agent-chip-name">' + capitalize(agent.name) + '</span>';

      chip.onclick = function() {
        agent.enabled = !agent.enabled;
        chip.className = 'agent-chip ' + (agent.enabled ? 'active' : 'inactive');
        if (agent.enabled) {
          connectAgent(agent.name);
        } else {
          disconnectAgent(agent.name);
        }
        updateSubtitle();
      };

      chipsBar.appendChild(chip);
    });
    updateSubtitle();
  }

  buildChips();

  // ─── WebSocket per Agent ───
  function connectAgent(name) {
    if (agentSockets[name] && agentSockets[name].readyState <= WebSocket.OPEN) return;

    const proto = location.protocol === 'https:' ? 'wss:' : 'ws:';
    const ws = new WebSocket(proto + '//' + location.host + '/ws/voice/' + name);
    ws.binaryType = 'arraybuffer';

    ws.onopen = function() {
      updateConnectionStatus();
    };

    ws.onmessage = function(evt) {
      if (evt.data instanceof ArrayBuffer) {
        // Queue audio with agent info for sequential playback
        audioQueue.push({ agent: name, data: evt.data });
        if (!isPlayingAudio) drainAudioQueue();
      } else {
        try {
          const msg = JSON.parse(evt.data);
          handleAgentMessage(name, msg);
        } catch(e) {
          // ignore
        }
      }
    };

    ws.onclose = function() {
      delete agentSockets[name];
      // Only reconnect if agent is still enabled
      const agent = AGENTS.find(function(a) { return a.name === name; });
      if (agent && agent.enabled) {
        setTimeout(function() { connectAgent(name); }, 3000);
      }
      updateConnectionStatus();
    };

    ws.onerror = function() {
      // onclose will handle reconnect
    };

    agentSockets[name] = ws;
  }

  function disconnectAgent(name) {
    if (agentSockets[name]) {
      agentSockets[name].close();
      delete agentSockets[name];
    }
    delete agentThinking[name];
    updateThinkingIndicator();
    updateConnectionStatus();
  }

  function updateConnectionStatus() {
    const active = getActiveAgents();
    const connected = active.filter(function(a) { return agentSockets[a.name] && agentSockets[a.name].readyState === WebSocket.OPEN; });

    if (active.length === 0) {
      statusBadge.textContent = 'No agents';
      statusBadge.className = '';
    } else if (connected.length === active.length) {
      statusBadge.textContent = 'All connected';
      statusBadge.className = 'connected';
    } else if (connected.length > 0) {
      statusBadge.textContent = connected.length + '/' + active.length + ' connected';
      statusBadge.className = 'connected';
    } else {
      statusBadge.textContent = 'Connecting...';
      statusBadge.className = '';
    }
  }

  function handleAgentMessage(agentName, msg) {
    const agent = AGENTS.find(function(a) { return a.name === agentName; });
    const color = agent ? agent.color : '#808098';

    if (msg.type === 'status') {
      const state = msg.status || msg.state || '';
      if (state === 'thinking' || state === 'processing') {
        agentThinking[agentName] = true;
      } else {
        delete agentThinking[agentName];
      }
      updateThinkingIndicator();
    } else if (msg.type === 'transcript') {
      delete agentThinking[agentName];
      updateThinkingIndicator();
      if (msg.role === 'user') {
        // Skip — we already showed user message when we sent it
      } else {
        addAgentMessage(agentName, color, msg.text);
        // Cross-inject: send this agent's response to ALL OTHER agents
        // so they can see what was said (but won't respond to it)
        Object.keys(agentSockets).forEach(function(otherName) {
          if (otherName !== agentName) {
            var otherWs = agentSockets[otherName];
            if (otherWs && otherWs.readyState === WebSocket.OPEN) {
              otherWs.send(JSON.stringify({
                type: 'group_context',
                from: agentName,
                text: msg.text,
              }));
            }
          }
        });
      }
    } else if (msg.type === 'error') {
      delete agentThinking[agentName];
      updateThinkingIndicator();
      addAgentMessage(agentName, color, '[Error] ' + (msg.message || 'An error occurred'));
    }
  }

  function updateThinkingIndicator() {
    const thinking = Object.keys(agentThinking);
    if (thinking.length > 0) {
      const names = thinking.map(capitalize).join(', ');
      statusLabel.textContent = names + (thinking.length > 1 ? ' are thinking...' : ' is thinking...');
      statusIndicator.style.display = 'flex';
      scrollToBottom();
    } else {
      statusIndicator.style.display = 'none';
    }
  }

  // ─── Messages ───
  function removeEmptyState() {
    const es = document.getElementById('empty-state');
    if (es) es.remove();
  }

  function addUserMessage(text, via) {
    removeEmptyState();
    messageCount++;

    const row = document.createElement('div');
    row.className = 'message-row user';

    const now = formatTime(new Date());
    row.innerHTML =
      '<div class="msg-avatar user">C</div>' +
      '<div>' +
        '<div class="msg-bubble user">' + escapeHtml(text) + '</div>' +
        '<div class="msg-meta" style="justify-content:flex-end;">' +
          (via ? '<span class="msg-via">' + escapeHtml(via) + '</span>' : '') +
          '<span class="msg-time">' + now + '</span>' +
        '</div>' +
      '</div>';

    chatArea.appendChild(row);
    scrollToBottom();
  }

  function addAgentMessage(agentName, color, text) {
    removeEmptyState();
    messageCount++;

    const row = document.createElement('div');
    row.className = 'message-row assistant';

    const initial = capitalize(agentName).charAt(0);
    const rgb = hexToRgb(color);
    const now = formatTime(new Date());

    row.innerHTML =
      '<div class="msg-avatar" style="background:' + color + ';color:#000;">' + initial + '</div>' +
      '<div>' +
        '<div class="msg-agent-label" style="color:' + color + ';">' + capitalize(agentName) + '</div>' +
        '<div class="msg-bubble assistant" style="border-left:3px solid ' + color + ';">' + escapeHtml(text) + '</div>' +
        '<div class="msg-meta">' +
          '<span class="msg-time">' + now + '</span>' +
        '</div>' +
      '</div>';

    chatArea.appendChild(row);
    scrollToBottom();
  }

  // ─── Text Input ───
  textInput.addEventListener('input', function() {
    this.style.height = 'auto';
    this.style.height = Math.min(this.scrollHeight, 120) + 'px';
    btnSend.disabled = !this.value.trim();
  });

  textInput.addEventListener('keydown', function(e) {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      if (this.value.trim()) sendTextMessage();
    }
  });

  // ─── Send to All Active Agents ───
  function broadcastText(text) {
    const active = getActiveAgents();
    active.forEach(function(agent) {
      const ws = agentSockets[agent.name];
      if (ws && ws.readyState === WebSocket.OPEN) {
        ws.send(JSON.stringify({ type: 'text_message', text: text }));
      }
    });
  }

  function broadcastBinary(buffer) {
    const active = getActiveAgents();
    active.forEach(function(agent) {
      const ws = agentSockets[agent.name];
      if (ws && ws.readyState === WebSocket.OPEN) {
        // Copy the buffer for each agent — can't share the same ArrayBuffer
        const copy = buffer.slice(0);
        ws.send(copy);
      }
    });
  }

  function broadcastEndOfSpeech() {
    const active = getActiveAgents();
    active.forEach(function(agent) {
      const ws = agentSockets[agent.name];
      if (ws && ws.readyState === WebSocket.OPEN) {
        ws.send('END_OF_SPEECH');
      }
    });
  }

  window.sendTextMessage = function() {
    const text = textInput.value.trim();
    if (!text) return;

    const active = getActiveAgents();
    if (active.length === 0) {
      statusBadge.textContent = 'No agents selected';
      statusBadge.className = 'error';
      return;
    }

    broadcastText(text);
    addUserMessage(text, 'text');

    textInput.value = '';
    textInput.style.height = 'auto';
    btnSend.disabled = true;
    textInput.focus();
  };

  // ─── Audio Capture (identical VAD/PCM logic) ───
  async function startCapture() {
    try {
      audioCtx = new (window.AudioContext || window.webkitAudioContext)({ sampleRate: SAMPLE_RATE });

      mediaStream = await navigator.mediaDevices.getUserMedia({
        audio: {
          sampleRate: SAMPLE_RATE,
          channelCount: 1,
          echoCancellation: true,
          noiseSuppression: true,
          autoGainControl: true,
        }
      });

      const source = audioCtx.createMediaStreamSource(mediaStream);
      scriptProcessor = audioCtx.createScriptProcessor(512, 1, 1);

      // Client-side VAD
      let isSpeaking = false;
      let silenceFrames = 0;
      let speechFrames = 0;
      const SILENCE_THRESHOLD = 0.01;
      const SILENCE_FRAMES_NEEDED = 30;
      const SPEECH_FRAMES_NEEDED = 3;

      scriptProcessor.onaudioprocess = function(e) {
        if (!isVoiceActive) return;

        const inputData = e.inputBuffer.getChannelData(0);

        // RMS energy
        let sum = 0;
        for (let i = 0; i < inputData.length; i++) sum += inputData[i] * inputData[i];
        const rms = Math.sqrt(sum / inputData.length);

        // Float32 to Int16 PCM
        const pcm = new Int16Array(inputData.length);
        for (let i = 0; i < inputData.length; i++) {
          const s = Math.max(-1, Math.min(1, inputData[i]));
          pcm[i] = s < 0 ? s * 0x8000 : s * 0x7FFF;
        }

        if (rms > SILENCE_THRESHOLD) {
          speechFrames++;
          silenceFrames = 0;
          if (!isSpeaking && speechFrames >= SPEECH_FRAMES_NEEDED) {
            isSpeaking = true;
          }
        } else {
          speechFrames = 0;
          if (isSpeaking) {
            silenceFrames++;
            if (silenceFrames >= SILENCE_FRAMES_NEEDED) {
              isSpeaking = false;
              silenceFrames = 0;
              broadcastEndOfSpeech();
            }
          }
        }

        if (isSpeaking || silenceFrames < SILENCE_FRAMES_NEEDED) {
          broadcastBinary(pcm.buffer);
        }

        updateVisualizer(inputData);
      };

      source.connect(scriptProcessor);
      scriptProcessor.connect(audioCtx.destination);
    } catch (err) {
      statusBadge.textContent = 'Mic denied';
      statusBadge.className = 'error';
      isVoiceActive = false;
      updateVoiceUI();
    }
  }

  function stopCapture() {
    if (scriptProcessor) { scriptProcessor.disconnect(); scriptProcessor = null; }
    if (mediaStream) { mediaStream.getTracks().forEach(function(t) { t.stop(); }); mediaStream = null; }
    if (audioCtx) { audioCtx.close(); audioCtx = null; }
    vizBars.forEach(function(b) { b.style.height = '4px'; });
  }

  // ─── Audio Playback (sequential queue across all agents) ───
  function drainAudioQueue() {
    if (audioQueue.length === 0) {
      isPlayingAudio = false;
      return;
    }
    isPlayingAudio = true;

    const chunks = [];
    const firstAgent = audioQueue[0].agent;
    // Drain contiguous chunks from the same agent
    while (audioQueue.length > 0 && audioQueue[0].agent === firstAgent) {
      chunks.push(audioQueue.shift().data);
    }

    const blob = new Blob(chunks, { type: 'audio/wav' });
    const url = URL.createObjectURL(blob);
    const audio = new Audio(url);
    audio.onended = function() {
      URL.revokeObjectURL(url);
      if (audioQueue.length > 0) {
        drainAudioQueue();
      } else {
        isPlayingAudio = false;
      }
    };
    audio.play().catch(function(e) {
      console.error('Playback failed:', e);
      isPlayingAudio = false;
      // Try next in queue
      if (audioQueue.length > 0) drainAudioQueue();
    });
  }

  // ─── Visualizer ───
  function updateVisualizer(samples) {
    const step = Math.floor(samples.length / vizBars.length);
    for (let i = 0; i < vizBars.length; i++) {
      let sum = 0;
      for (let j = 0; j < step; j++) {
        sum += Math.abs(samples[i * step + j] || 0);
      }
      const avg = sum / step;
      const height = Math.max(4, Math.min(32, avg * 400));
      vizBars[i].style.height = height + 'px';
    }
  }

  // ─── UI ───
  function updateVoiceUI() {
    if (isVoiceActive) {
      btnVoiceToggle.classList.add('voice-active');
      btnVoiceBottom.classList.add('active');
      visualizer.classList.add('active');
    } else {
      btnVoiceToggle.classList.remove('voice-active');
      btnVoiceBottom.classList.remove('active');
      visualizer.classList.remove('active');
    }
  }

  window.toggleVoice = async function() {
    if (isVoiceActive) {
      isVoiceActive = false;
      stopCapture();
      updateVoiceUI();
      statusBadge.textContent = 'Voice paused';
      statusBadge.className = 'connected';
    } else {
      const active = getActiveAgents();
      if (active.length === 0) {
        statusBadge.textContent = 'No agents selected';
        statusBadge.className = 'error';
        return;
      }
      isVoiceActive = true;
      updateVoiceUI();
      await startCapture();
      statusBadge.textContent = 'Listening...';
      statusBadge.className = 'listening';
    }
  };

  window.clearHistory = function() {
    chatArea.innerHTML = '';
    messageCount = 0;

    const es = document.createElement('div');
    es.className = 'empty-state';
    es.id = 'empty-state';
    es.innerHTML =
      '<div class="group-icon-large">G</div>' +
      '<h2>Group Voice Chat</h2>' +
      '<p>Toggle agents above, then type or speak. All active agents will respond.</p>';
    chatArea.appendChild(es);

    // Tell all agents
    Object.keys(agentSockets).forEach(function(name) {
      var ws = agentSockets[name];
      if (ws && ws.readyState === WebSocket.OPEN) {
        ws.send('CLEAR_HISTORY');
      }
    });
  };

  // ─── Init: Connect default-enabled agents ───
  AGENTS.forEach(function(agent) {
    if (agent.enabled) {
      connectAgent(agent.name);
    }
  });

  // Keep-alive ping every 15s to all connected agents
  setInterval(function() {
    Object.keys(agentSockets).forEach(function(name) {
      var ws = agentSockets[name];
      if (ws && ws.readyState === WebSocket.OPEN) {
        ws.send(JSON.stringify({ type: 'ping' }));
      }
    });
  }, 15000);

})();
</script>
</body>
