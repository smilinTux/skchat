<!DOCTYPE html>
<html>
<head>
  <!--
    If you are serving your web app in a path other than the root, change the
    href value below to reflect the base path you are serving from.

    The path provided below has to start and end with a slash "/" in order for
    it to work correctly.

    For more details:
    * https://developer.mozilla.org/en-US/docs/Web/HTML/Element/base

    This is a placeholder for base href that will be replaced by the value of
    the `--base-href` argument provided to `flutter build`.
  -->
  <base href="/">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="A new Flutter project.">

  <!--
    Viewport: tell mobile browsers to RESIZE the layout+visual viewport when the
    soft keyboard (an "interactive widget") appears, instead of scrolling the
    Flutter canvas to reveal the focused input. Without this, mobile Chrome/Safari
    scroll the whole canvas up — the conversation goes blank and "shoots up" when
    the composer is tapped. `interactive-widget=resizes-content` is honored by
    Chrome 108+/Firefox 132+; Safari ignores it (still no WebKit support as of
    2026), so the conversation list is ALSO bottom-anchored (reverse:true) in
    Dart to keep the latest messages pinned above the keyboard on iOS.
  -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover, interactive-widget=resizes-content">

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="skchat">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>skchat</title>
  <link rel="manifest" href="manifest.json">
</head>
<body>
  <!--
    PQC Q5 — post-quantum (X25519 + ML-KEM-768) in the browser.
    Bundles @noble/post-quantum's ml_kem768 (audited pure-JS lattice impl) onto
    globalThis.skPqc so sk_pqc's web backend can do real ML-KEM-768 — closing the
    WebCrypto-has-no-PQC gap. Loaded as a module BEFORE the Flutter bootstrap so
    the symbol exists when the Dart web backend (createMlKem768Backend) runs.
    Rebuild with: (cd web/pqc && npm install && npm run build).
  -->
  <script type="module" src="sk_pqc_noble.js"></script>

  <!--
    TV-cast helper (Cast-to-TV). Owns the <video> that plays a room's HLS
    stream and wires the three cast paths: Safari AirPlay (native), Chromecast
    (Google Cast SDK / CAF), and hls.js for Chrome. The Google Cast SDK and
    hls.js are loaded lazily from a CDN by this helper on first cast/mount, so
    they cost nothing until a user taps "Cast to TV". Exposes window.skCast.
  -->
  <script src="sk_cast.js"></script>

  <!--
    You can customize the "flutter_bootstrap.js" script.
    This is useful to provide a custom configuration to the Flutter loader
    or to give the user feedback during the initialization process.

    For more details:
    * https://docs.flutter.dev/platform-integration/web/initialization
  -->
  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
